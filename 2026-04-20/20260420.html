<!DOCTYPE html>
<html lang="ko">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1622;font-family:'Share Tech Mono','Noto Sans KR',monospace;color:#33ff33;overflow:hidden;height:100vh;user-select:none}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 3px)}
canvas#scene{position:fixed;inset:0;z-index:1}

.intro-overlay{
  position:fixed;inset:0;z-index:500;

  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.8s;
}
.intro-overlay.hide{opacity:0;pointer-events:none}
.intro-tag{
  font-size:0.6rem;letter-spacing:0.3em;color:#ff4444;
  border:1px solid #ff444444;padding:4px 16px;border-radius:2px;
  margin-bottom:16px;font-weight:700;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.intro-headline{
  font-family:'Noto Sans KR',sans-serif;font-weight:900;
  font-size:clamp(1.5rem,5vw,3rem);
  color:#fff;text-align:center;line-height:1.3;
  max-width:700px;padding:0 20px;
  text-shadow:0 0 40px rgba(255,255,255,0.1);
}
.intro-sub{
  font-size:0.75rem;color:#33ff3366;margin-top:12px;

}
.intro-hint{
  font-size:0.55rem;color:#ffffff22;margin-top:24px;
  letter-spacing:0.1em;
}
.hud-tl{position:fixed;top:10px;left:12px;z-index:10;pointer-events:none}
.hud-headline{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:clamp(0.55rem,1.3vw,0.85rem);color:#ff4444;text-shadow:0 0 8px rgba(255,68,68,0.3);line-height:1.35;max-width:220px}

.allies-bar .ab-title{font-size:0.5rem;color:#33ff3355;letter-spacing:0.18em;margin-bottom:4px}

.allies-bar .ab-item{padding:3px 10px;border:1px solid #33ff3555;border-radius:3px;font-size:clamp(0.65rem,1.3vw,0.8rem);color:#33ff33;font-weight:700;font-family:'Noto Sans KR','Share Tech Mono',sans-serif;text-shadow:0 0 5px rgba(51,255,51,0.25);transition:all 0.4s}
.ab-scramble{padding:3px 10px;font-size:clamp(0.65rem,1.3vw,0.8rem);color:#33ff33;font-weight:700;font-family:'Noto Sans KR','Share Tech Mono',sans-serif}

.allies-bar .ab-item.adding{animation:slideDown 0.4s ease}

.ab-changes{margin-top:5px;font-size:0.55rem;min-height:1em;text-align:center;transition:opacity 0.3s}
.ab-changes .ch-break{color:#ff4444aa}
.ab-changes .ch-new{color:#33ff33aa}
.typing-zone{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(8,18,28,0.92);border-top:1px solid #33ff3322;padding:8px 14px 12px}

.toast-area{

  pointer-events:none;text-align:center;
  max-width:500px;width:90vw;

}

.toast{
  font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;font-weight:700;

  animation:toastIn 0.3s ease,toastOut 0.5s ease 3s forwards;
}
.toast.success{color:#33ff33}
.toast.fail{color:#ff4444}
.toast.neutral{color:#ffaa33}
.toast.trump{color:#ff6600;font-size:0.85rem;padding:6px 0;text-shadow:0 0 8px rgba(255,102,0,0.3)}
.toast .toast-title{font-size:0.7rem}
.toast.trump .toast-title{font-size:0.9rem}
.toast .toast-stmt{font-size:0.55rem;opacity:0.6;margin-top:1px}
@keyframes toastIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0}}
.typing-label{text-align:center;margin-bottom:4px;font-size:clamp(0.8rem,2vw,1.2rem);font-weight:700;font-family:'Noto Sans KR',sans-serif;min-height:1.4em;color:#ffaa33;text-shadow:0 0 5px rgba(255,170,51,0.2)}
.typing-input-wrap{display:flex;align-items:center;justify-content:center;max-width:480px;margin:0 auto}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
#typing-input::placeholder{color:#33ff3322}
.typing-actions{display:flex;justify-content:center;gap:12px;margin-top:4px;font-size:0.5rem}

.alliance-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.alliance-overlay.show{opacity:1;pointer-events:auto}
.alliance-overlay .ao-title{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:clamp(1rem,3vw,1.5rem);color:#ff4444;letter-spacing:0.1em;margin-bottom:8px;text-shadow:0 0 20px rgba(255,68,68,0.4)}
.alliance-overlay .ao-subtitle{font-size:0.55rem;color:#ffaa33;margin-bottom:12px;letter-spacing:0.1em}

.alliance-overlay .ao-timer{margin-top:12px;font-size:0.5rem;color:#33ff3333}
.gameover{position:fixed;inset:0;z-index:200;background:rgba(8,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.5s}
.gameover.show{opacity:1;pointer-events:auto}
.gameover .go-title{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:clamp(2.5rem,8vw,5rem);color:#ff4444;text-shadow:0 0 40px rgba(255,0,0,0.5)}
.gameover .go-sub{font-size:clamp(0.8rem,2vw,1.2rem);color:#ff444466;margin-top:6px}
.gameover .go-score{font-size:1.1rem;color:#ffaa33;margin-top:16px}
.gameover .go-restart{margin-top:20px;font-size:0.55rem;color:#ffffff22;letter-spacing:0.1em;animation:blink 1.5s infinite;border:none;background:none;cursor:pointer;font-family:'Share Tech Mono',monospace}

.seized-panel{

.seized-panel .sp-title{font-size:0.55rem;color:#ff444488;letter-spacing:0.1em;margin-bottom:4px}
.seized-panel .sp-list{display:flex;flex-direction:column;gap:2px}
.seized-panel .sp-item{
  font-size:0.6rem;color:#ff444488;

}
.announce-overlay.show{opacity:1;pointer-events:auto}
.ann-badge{
  font-size:0.6rem;letter-spacing:0.2em;padding:4px 14px;
  border-radius:3px;margin-bottom:10px;font-weight:700;
}
.ann-badge.success{background:#33ff3333;color:#33ff33;border:1px solid #33ff3355}
.ann-badge.fail{background:#ff444433;color:#ff4444;border:1px solid #ff444455}
.ann-title{
  font-family:'Noto Sans KR',sans-serif;font-weight:900;
  font-size:clamp(1.5rem,4vw,2.8rem);

}
.ann-title.success{color:#33ff33;text-shadow:0 0 30px rgba(51,255,51,0.5)}
.ann-title.fail{color:#ff4444;text-shadow:0 0 30px rgba(255,68,68,0.5)}
.ann-sub{
  font-size:0.75rem;margin-top:6px;
  font-family:'Noto Sans KR',sans-serif;
}
.ann-sub.success{color:#33ff3388}
.ann-sub.fail{color:#ff444488}
.ann-statements{
  margin-top:16px;display:flex;flex-direction:column;gap:4px;
  max-width:500px;width:90vw;
}
.ann-stmt{
  font-size:0.7rem;padding:5px 10px;border-radius:3px;
  font-family:'Noto Sans KR',sans-serif;
  opacity:0;transform:translateY(10px);
}
.ann-stmt.ally{background:rgba(51,255,51,0.06);color:#33ff33aa;border-left:2px solid #33ff3344}
.ann-stmt.enemy{background:rgba(255,68,68,0.06);color:#ff4444aa;border-left:2px solid #ff444444}
.ann-stmt.neutral{background:rgba(255,170,51,0.06);color:#ffaa33aa;border-left:2px solid #ffaa3344}
.ann-dismiss{margin-top:16px;font-size:0.55rem;color:#ffffff33;letter-spacing:0.1em;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:0.8}}
</style>
</head>

<script>
const cv=document.getElementById('scene'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);

// ═══════════════════════════════════════
// MAP — screen-space approach
// We define everything in screen-normalized coords [0-1, 0-1]
// This avoids geo projection issues entirely
// Layout: water channel runs from left to right through center
// Iran = top landmass, Oman/Musandam = bottom landmass
// Strait narrows around x=0.52
// ═══════════════════════════════════════

// Iran coast (top) — y values define southern edge of Iran
const IRAN = [
  [0,0],[1,0],[1,0.15],
  [0.98,0.17],[0.95,0.20],[0.90,0.24],[0.85,0.27],
  [0.80,0.29],[0.75,0.30],[0.70,0.31],[0.65,0.33],
  [0.60,0.35],[0.57,0.36],[0.54,0.35],[0.52,0.33],
  [0.50,0.32],[0.48,0.33],[0.45,0.35],[0.42,0.34],
  [0.38,0.32],[0.34,0.30],[0.30,0.28],[0.25,0.27],
  [0.20,0.29],[0.15,0.31],[0.10,0.30],[0.05,0.28],[0,0.26],
];
// Oman/UAE coast (bottom) — y values define northern edge
const OMAN = [
  [0,1],[1,1],[1,0.72],
  [0.95,0.70],[0.90,0.68],[0.85,0.66],[0.80,0.65],
  [0.75,0.67],[0.70,0.70],[0.65,0.72],[0.60,0.70],
  [0.57,0.68],[0.55,0.66],[0.53,0.65],[0.50,0.66],
  [0.47,0.68],[0.44,0.70],[0.40,0.72],[0.35,0.73],
  [0.30,0.72],[0.25,0.70],[0.20,0.68],[0.15,0.67],
  [0.10,0.68],[0.05,0.70],[0,0.72],
];
// Musandam peninsula — juts up from Oman side into the strait
const MUSANDAM = [
  [0.48,0.68],[0.49,0.64],[0.50,0.60],[0.51,0.56],
  [0.52,0.53],[0.53,0.51],[0.545,0.50],
  [0.56,0.51],[0.57,0.53],[0.575,0.56],
  [0.58,0.60],[0.575,0.64],[0.57,0.66],[0.55,0.66],
  [0.53,0.65],[0.50,0.66],[0.48,0.68],
];
// Qeshm island (Iran side, in the strait)
const QESHM = [
  [0.42,0.36],[0.44,0.37],[0.47,0.38],[0.50,0.38],
  [0.52,0.37],[0.54,0.38],[0.55,0.39],
  [0.54,0.40],[0.52,0.41],[0.50,0.41],
  [0.47,0.41],[0.44,0.40],[0.42,0.39],[0.42,0.36],
];

// Gate position — at the narrowest point between Qeshm and Musandam tip
// Top of gate: just below Qeshm (y≈0.42)
// Bottom of gate: just above Musandam tip (y≈0.50)
const GATE = {
  x: 0.535,       // x position of gate
  topY: 0.415,    // just below Qeshm
  botY: 0.495,    // just above Musandam tip
};

// Shipping lanes — must pass through the water channel
// Eastbound (south lane): left → right, passing between Qeshm and Musandam
const LANE_E = [
  [0.02,0.55],[0.08,0.54],[0.15,0.53],[0.22,0.52],
  [0.30,0.50],[0.38,0.48],[0.44,0.46],[0.50,0.45],
  [0.535,0.455],  // gate point
  [0.58,0.47],[0.64,0.50],[0.70,0.53],[0.78,0.55],
  [0.86,0.56],[0.94,0.55],[1.02,0.54],
];
// Westbound (north lane): right → left, slightly north of eastbound
const LANE_W = [
  [1.02,0.48],[0.94,0.47],[0.86,0.46],[0.78,0.45],
  [0.70,0.44],[0.64,0.43],[0.58,0.43],
  [0.535,0.44],   // gate point
  [0.50,0.44],[0.44,0.43],[0.38,0.42],[0.30,0.42],
  [0.22,0.44],[0.15,0.46],[0.08,0.48],[0.02,0.50],
];
const GATE_T_E = 8/15;  // index 8 out of 15 points for eastbound
const GATE_T_W = 7/15;  // index 7 out of 15 points for westbound

function laneScr(lane,t){
  t=Math.max(0,Math.min(1,t));
  const idx=t*(lane.length-1),i=Math.floor(idx),f=idx-i;
  const a=lane[Math.min(i,lane.length-1)],b=lane[Math.min(i+1,lane.length-1)];
  return{x:(a[0]+(b[0]-a[0])*f)*W, y:(a[1]+(b[1]-a[1])*f)*H};
}

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const COUNTRIES=[
  {name:'미국',en:'USA',flag:'🇺🇸'},{name:'중국',en:'CHINA',flag:'🇨🇳'},
  {name:'러시아',en:'RUSSIA',flag:'🇷🇺'},{name:'이란',en:'IRAN',flag:'🇮🇷'},
  {name:'영국',en:'UK',flag:'🇬🇧'},{name:'프랑스',en:'FRANCE',flag:'🇫🇷'},
  {name:'독일',en:'GERMANY',flag:'🇩🇪'},{name:'일본',en:'JAPAN',flag:'🇯🇵'},
  {name:'한국',en:'KOREA',flag:'🇰🇷'},{name:'인도',en:'INDIA',flag:'🇮🇳'},
  {name:'사우디',en:'SAUDI',flag:'🇸🇦'},{name:'터키',en:'TURKEY',flag:'🇹🇷'},
  {name:'이스라엘',en:'ISRAEL',flag:'🇮🇱'},{name:'파키스탄',en:'PAKISTAN',flag:'🇵🇰'},
  {name:'이집트',en:'EGYPT',flag:'🇪🇬'},{name:'브라질',en:'BRAZIL',flag:'🇧🇷'},
  {name:'호주',en:'AUSTRALIA',flag:'🇦🇺'},{name:'북한',en:'DPRK',flag:'🇰🇵'},
  {name:'UAE',en:'UAE',flag:'🇦🇪'},{name:'카타르',en:'QATAR',flag:'🇶🇦'},
];
const WORDS_KO=['석유','원유','제재','봉쇄','핵','미사일','외교','협상','휴전','나포','압박','동맹','패권','안보'];
const SIZES=[
  {s:0.35,r:8,spd:2.5},   // 소형 쾌속정
  {s:0.55,r:13,spd:1.8},  // 어선

class Ship{
  constructor(dir){
    const c=COUNTRIES[Math.floor(Math.random()*COUNTRIES.length)];
    const w=WORDS_KO[Math.floor(Math.random()*WORDS_KO.length)];
    this.id=shipId++;this.country=c;
    this.label=`${c.name} ${w}`;
    this.flag=c.flag;this.dir=dir;
    this.lane=dir==='east'?LANE_E:LANE_W;
    this.gateT=dir==='east'?GATE_T_E:GATE_T_W;
    this.t=-0.03;this.targetT=0;this.state='approaching';
    this.sz=SIZES[Math.floor(Math.random()*5)];
    this.opacity=1;this.sinkY=0;this.flash=0;
    this.ox=0;this.oy=0;this.vox=0;this.voy=0;
    this.bobPhase=Math.random()*Math.PI*2;
    this.baseSpeed=0.0005*this.sz.spd;
    this.seizeTargetX=0;this.seizeTargetY=0; // coast destination when seized
  }
  isAlly(){return allies.has(this.country.name);}
  pos(){
    if(this.state==='seized' && this.seizeTargetX){
      return{x:this.seizeTargetX, y:this.seizeTargetY};
    }
    const p=laneScr(this.lane,Math.max(0,this.t));
    return{
      x:p.x+this.ox+Math.sin(Date.now()*0.0008+this.bobPhase)*1.5,
      y:p.y+this.oy+this.sinkY+Math.cos(Date.now()*0.001+this.bobPhase)*1,
    };
  }
}

function resolveCollisions(){
  for(let i=0;i<ships.length;i++){
    const a=ships[i];if(a.state==='gone'||a.opacity<=0)continue;
    const ap=a.pos();
    for(let j=i+1;j<ships.length;j++){
      const b=ships[j];if(b.state==='gone'||b.opacity<=0)continue;
      const bp=b.pos();
      const dx=bp.x-ap.x,dy=bp.y-ap.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minD=a.sz.r+b.sz.r;
      if(dist<minD&&dist>0.1){
        const ov=(minD-dist)/2,nx=dx/dist,ny=dy/dist;
        a.vox-=nx*ov*0.12;a.voy-=ny*ov*0.12;
        b.vox+=nx*ov*0.12;b.voy+=ny*ov*0.12;
      }
    }
  }
}

function spawnShip(){
  const dir=Math.random()>0.5?'east':'west';
  const s=new Ship(dir);
  const q=ships.filter(sh=>sh.dir===dir&&(sh.state==='queuing'||sh.state==='approaching'));
  s.t=-0.03-q.length*0.04;
  ships.push(s);reindexQueue();
}
function reindexQueue(){
  for(const dir of['east','west']){
    const q=ships.filter(s=>s.dir===dir&&s.state==='queuing');
    q.sort((a,b)=>b.t-a.t);
    const gT=dir==='east'?GATE_T_E:GATE_T_W;
    q.forEach((s,i)=>{s.targetT=gT-0.015-i*0.035;});
  }
}
function getFirst(){
  let best=null;
  for(const s of ships){if(s.state!=='queuing')continue;if(!best||s.t>best.t)best=s;}
  return best;
}

  const pool=[...COUNTRIES];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  allies=new Set(pool.slice(0,10).map(c=>c.name));
}

function showAllianceOverlay(){
  const currentAllies=[...allies];
  const nonAllies=COUNTRIES.filter(c=>!allies.has(c.name)).map(c=>c.name);
  const breakCount=1+Math.floor(Math.random()*3);

  // Remove badges, show scramble text in their place, then rebuild
  const listEl=document.getElementById('ab-list');
  const allNames=[...allies]; // current before change
  // Replace badges with plain scramble text
  listEl.innerHTML=allNames.map(n=>`<span class="ab-scramble">${n}</span>`).join('');

  if(typeof baffle!=='undefined'){

      });

      setTimeout(()=>{ updateAlliesBar(); },700);
    },600);

    toBreak.forEach(n=>allies.delete(n));
    toAdd.forEach(n=>allies.add(n));

}

const inputEl=document.getElementById('typing-input');
let isComposing=false,pendingClear=false;
let pendingAction=null; // 'pass' or 'seize'
let deferCooldown=0; // timestamp when defer is available again

inputEl.addEventListener('compositionstart',()=>{isComposing=true;});
inputEl.addEventListener('compositionend',()=>{
  isComposing=false;
  if(pendingClear){pendingClear=false;setTimeout(()=>{inputEl.value='';},0);}
  // If Enter/Esc was pressed during composition, execute now
  if(pendingAction){
    const action=pendingAction;pendingAction=null;
    setTimeout(()=>executeAction(action),10);
  }
});
function clearInput(){if(isComposing){pendingClear=true;}else{inputEl.value='';}}

function executeAction(action){
  if(gameOver||alliancePhase)return;
  const first=getFirst();if(!first)return;
  const val=inputEl.value.trim();
  if(val!==first.label){
    // Wrong input — shake + flash
    if(val.length>0){
      inputEl.style.borderColor='#ff4444';
      inputEl.style.animation='shake 0.3s';
      document.getElementById('typing-label').innerHTML=
        `<span style="color:#ff4444">⚠ 오입력! — 정확히 입력하세요</span>`;
      setTimeout(()=>{
        inputEl.style.borderColor='#33ff3344';
        inputEl.style.animation='';
        updateLabel();
      },800);
    }
    return;
  }

  // Open gate briefly
  gateOpen=true;
  gateOpenTimer=90; // ~1.5 seconds at 60fps

  if(action==='pass'){
    // Israel pass = instant game over
    if(first.country.name==='이스라엘'){
      showSpecialAnnounce('💀 치명적 실수','🇮🇱 이스라엘 선박을 통과시켰습니다!\n해협 방어 실패 — 즉시 패배','#ff0000');
      first.state='transiting';gateOpen=true;gateOpenTimer=90;
      // Massive explosion at gate
      const gp={x:GATE.x*W,y:(GATE.topY+GATE.botY)/2*H};
      for(let j=0;j<50;j++){
        missileParticles.push({x:gp.x+(Math.random()-0.5)*30,y:gp.y+(Math.random()-0.5)*30,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:70+Math.random()*40,age:0,size:3+Math.random()*5,color:['#ff4444','#ff6600','#ffaa33','#ff0000'][Math.floor(Math.random()*4)]});
      }
      if(typeof confetti==='function') confetti({particleCount:100,spread:120,origin:{y:0.5},colors:['#ff0000','#ff4444','#ff6600']});
      clearInput();updateHUD();updateLabel();
      setTimeout(()=>endGame(),1500);
      return;
    }
    if(first.isAlly()){score+=10;showAnnounce('pass-ally',first);}
    else{hp--;first.flash=1;showAnnounce('pass-enemy',first);}
    first.state='transiting';
  } else {
    // Israel seize = artillery strike, sink in place
    if(first.country.name==='이스라엘'){
      score+=50;
      first.flash=1;
      // Fire from nearest battery
      const fp=first.pos();
      const batteries=[[0.48,0.33],[0.54,0.34],[0.60,0.34],[0.44,0.34],[0.38,0.31]];
      const nearest=batteries.reduce((best,b)=>{
        const d=Math.hypot(b[0]*W-fp.x,b[1]*H-fp.y);
        return d<best.d?{d,b}:best;
      },{d:Infinity,b:batteries[0]});
      // Artillery shell flying
      flyingObjects.push({type:'shell',x:nearest.b[0]*W,y:nearest.b[1]*H,targetX:fp.x,targetY:fp.y,speed:8,victim:first,phase:'flying',timer:0});
      showAnnounce('seize-enemy',first);
      // Don't move to Iran — will sink in place after shell hits
      first.state='sinking';first.sinkTimer=0;
      clearInput();reindexQueue();updateHUD();updateLabel();
      if(hp<=0)endGame();
      return;
    }
    if(!first.isAlly()){score+=20*trumpBonusMultiplier;showAnnounce('seize-enemy',first);}
    else{hp--;showAnnounce('seize-ally',first);}
    first.state='seized';first.flash=1;
    addToSeizedList(first);
  }
  clearInput();reindexQueue();updateHUD();updateLabel();
  if(hp<=0)endGame();

  // Track processed ships
  processedCount++;
  // Alliance shift every N ships
  if(processedCount>=nextAllianceAt){
    nextAllianceAt=processedCount+SHIPS_PER_ALLIANCE;
    setTimeout(()=>{if(!gameOver)showAllianceOverlay();},800);
  }
  // Special event every ~5 ships
  if(processedCount>=nextEventAt && !alliancePhase){
    nextEventAt=processedCount+4+Math.floor(Math.random()*3);
    setTimeout(()=>{if(!gameOver&&!alliancePhase)triggerSpecialEvent();},500);
  }
  // Trump rage when queue is long — check in game loop instead
}

inputEl.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(alliancePhase)return;
  if(e.key==='Enter'){
    e.preventDefault();
    if(isComposing){pendingAction='pass';return;}
    executeAction('pass');
  }
  if(e.key==='Escape'){
    e.preventDefault();
    if(isComposing){pendingAction='seize';return;}
    executeAction('seize');
  }
  if(e.key==='Tab'){
    e.preventDefault();
    if(Date.now()<deferCooldown) return;
    const first=getFirst();if(!first) return;
    deferCooldown=Date.now()+2000;
    // Set to 'deferring' state — will animate backward
    first.state='deferring';
    first.deferTarget=first.t-0.15-Math.random()*0.05; // go back
    // Spawn angry speech
    const DEFER_LINES=['뭐?! 돌아가라고?','아 진짜...','왜 나만!','항의한다!','이게 나라냐','기다렸는데!','연료비 누가 내?','짜증나네 진짜'];
    speechBubbles.push({shipId:first.id,offsetY:-15*first.sz.s,text:DEFER_LINES[Math.floor(Math.random()*DEFER_LINES.length)],life:100,age:0,size:Math.max(9,10+first.sz.s*2)});
    clearInput();
    // Move to end of ships array
    const idx=ships.indexOf(first);
    if(idx>-1){ships.splice(idx,1);ships.push(first);}
    updateLabel();
    document.getElementById('typing-label').innerHTML=
      `<span style="color:#ffaa33">↩ ${first.flag} ${first.label} 계류</span>`;
    setTimeout(updateLabel,1000);
  }
});
function updateLabel(){
  const el=document.getElementById('typing-label');const first=getFirst();
  if(!first||gameOver||alliancePhase){el.innerHTML=`<span style="color:#33ff3322">${alliancePhase?'해협 폐쇄 중…':'선박 대기 중…'}</span>`;return;}
  el.textContent=`${first.flag} ${first.label}`;
}
let seizedList=[];
function addToSeizedList(ship){
  seizedList.push({flag:ship.flag,label:ship.label,country:ship.country.name,ally:ship.isAlly()});
  const el=document.getElementById('sp-list');
  const item=document.createElement('div');
  item.className='sp-item';
  item.textContent=`${ship.flag} ${ship.label}${ship.isAlly()?' ⚠외교사고':''}`;
  if(ship.isAlly()) item.style.color='#ffaa3388';
  el.insertBefore(item,el.firstChild);
  // Keep max 15
  while(el.children.length>15) el.removeChild(el.lastChild);
}

document.addEventListener('click',()=>{if(!gameOver&&!alliancePhase)inputEl.focus();});
function updateHUD(){document.getElementById('score').textContent=score;document.getElementById('hp').textContent='♥'.repeat(Math.max(0,hp))+'♡'.repeat(Math.max(0,3-hp));}
function endGame(){
  gameOver=true;
  stats.passed++;
  const overlay=document.getElementById('gameover');
  document.getElementById('go-score').innerHTML=`최종 점수: ${score}<br><span style="font-size:0.7rem;color:#ffffff44">통과 ${stats.passed} | 나포 ${stats.seized} | 외교사고 ${stats.allySeized} | 적국통과 ${stats.enemyPassed}</span>`;
  setTimeout(()=>{
    overlay.classList.add('show');
    if(typeof baffle!=='undefined'){
      baffle('.go-title',{characters:'█▓▒░<>/',speed:80}).start().reveal(1500);
      baffle('.go-sub',{characters:'·•◦',speed:60}).start().reveal(1000);
    }
    // Enter to restart
    document.addEventListener('keydown',function restartKey(e){
      if(e.key==='Enter'){
        e.preventDefault();
        document.removeEventListener('keydown',restartKey);
        location.reload();
      }
    });
  },600);
}

let lastTrumpAt=0;

function checkTrumpEvent(){
  if(alliancePhase) return;
  const queueCount=ships.filter(s=>s.state==='queuing').length;

  // 20+ ships: bomber destroys gate, game over
  if(queueCount>=20){
    // Spawn bomber
    flyingObjects.push({type:'bomber',x:-100,y:H*0.2,targetX:GATE.x*W,targetY:GATE.topY*H,speed:4,phase:'approach',timer:0});
    showSpecialAnnounce('🇺🇸 TRUTH SOCIAL','🇺🇸 트럼프: "ENOUGH! B-52 출격! 해협을 날려버려라!"','#ff0000');
    return;
  }

  // 15+ ships: warning
  if(queueCount>=15 && !trumpWarned){
    trumpWarned=true;
    const warns=[
      '🇺🇸 트럼프: "배가 너무 많다! 10초 안에 정리 안 하면 폭격한다!"',
      '🇺🇸 트럼프: "WARNING! 해협이 막히고 있다! LAST CHANCE!"',
      '🇺🇸 트럼프: "이건 참을 수 없다! 폭격기 대기 중! HURRY UP!"',
    ];
    showSpecialAnnounce('🇺🇸 TRUTH SOCIAL',warns[Math.floor(Math.random()*warns.length)],'#ff6600');
  }
  if(queueCount<12) trumpWarned=false;

  // Regular trump events (missile, sanction, blockade)
  if(queueCount>=3 && processedCount-lastTrumpAt>=5){
    lastTrumpAt=processedCount;
    const tweet=TRUMP_TWEETS[Math.floor(Math.random()*TRUMP_TWEETS.length)];
    showSpecialAnnounce('🇺🇸 TRUTH SOCIAL',tweet.text,'#ff6600');

    const eff=tweet.effect;
    if(eff==='missile'){
      // Launch missile from right side
      const targets=ships.filter(s=>s.state==='queuing');
      if(targets.length>0){
        const victim=targets[Math.floor(Math.random()*targets.length)];
        const vp=victim.pos();
        flyingObjects.push({type:'missile',x:W+20,y:H*0.15,targetX:vp.x,targetY:vp.y,speed:6,victim:victim,phase:'flying',timer:0});
      }
    } else if(eff==='blockade'){
      gateOpen=false;gateOpenTimer=0;
      const area=document.getElementById('toast-area');
      const t2=document.createElement('div');t2.className='toast fail';
      t2.innerHTML=`<div class="toast-title">🚫 해협 강제 봉쇄!</div>`;
      area.appendChild(t2);setTimeout(()=>{if(t2.parentNode)t2.remove();},3000);
    } else if(eff==='sanction'){
      trumpBonusMultiplier=2;
      const area=document.getElementById('toast-area');
      const t2=document.createElement('div');t2.className='toast success';
      t2.innerHTML=`<div class="toast-title">💰 제재 강화! 나포 점수 2배 (15초)</div>`;
      area.appendChild(t2);setTimeout(()=>{if(t2.parentNode)t2.remove();},3000);
      setTimeout(()=>{trumpBonusMultiplier=1;},15000);
    }
  }
}

function updateFlyingObjects(){
  for(let i=flyingObjects.length-1;i>=0;i--){
    const f=flyingObjects[i];
    if(f.type==='missile'){
      const dx=f.targetX-f.x,dy=f.targetY-f.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<10){
        // Impact!
        if(f.victim&&f.victim.state==='queuing'){
          for(let j=0;j<30;j++){
            missileParticles.push({x:f.targetX,y:f.targetY,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:50+Math.random()*30,age:0,size:2+Math.random()*5,color:['#ff4444','#ffaa33','#ff6600','#ffcc00'][Math.floor(Math.random()*4)]});
          }
          f.victim.state='gone';f.victim.opacity=0;
          score+=5;updateHUD();reindexQueue();
          const area=document.getElementById('toast-area');
          const t2=document.createElement('div');t2.className='toast fail';
          t2.innerHTML=`<div class="toast-title">💥 ${f.victim.flag} ${f.victim.label} 격침!</div>`;
          area.appendChild(t2);setTimeout(()=>{if(t2.parentNode)t2.remove();},3000);
          if(typeof confetti==='function') confetti({particleCount:50,spread:80,origin:{y:0.5},colors:['#ff4444','#ff6600','#ffaa33']});
        }
        flyingObjects.splice(i,1);continue;
      }
      f.x+=dx/dist*f.speed;f.y+=dy/dist*f.speed;
      // Trail
      missileParticles.push({x:f.x,y:f.y,vx:(Math.random()-0.5)*0.5,vy:Math.random()*0.5,life:15,age:0,size:1.5,color:'#ffaa33'});
      // Draw missile
      const angle=Math.atan2(dy,dx);
      cx.save();cx.translate(f.x,f.y);cx.rotate(angle);
      cx.fillStyle='#ff4444';cx.beginPath();cx.moveTo(8,0);cx.lineTo(-4,-3);cx.lineTo(-4,3);cx.closePath();cx.fill();
      cx.restore();
    } else if(f.type==='bomber'){
      if(f.phase==='approach'){
        const dx=f.targetX-f.x,dy=f.targetY-f.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        f.x+=dx/dist*f.speed;f.y+=dy/dist*f.speed;
        // Draw bomber
        cx.save();cx.translate(f.x,f.y);
        cx.fillStyle='#888';
        cx.beginPath();cx.moveTo(20,0);cx.lineTo(-10,-12);cx.lineTo(-15,0);cx.lineTo(-10,12);cx.closePath();cx.fill();
        cx.fillStyle='#666';cx.fillRect(-15,-2,8,4);
        cx.restore();
        // Engine trail
        missileParticles.push({x:f.x-15,y:f.y,vx:-1-Math.random(),vy:(Math.random()-0.5)*0.5,life:20,age:0,size:2,color:'#ffaa33'});
        if(dist<30){
          f.phase='bombing';f.timer=0;
          // Massive explosion at gate
          for(let j=0;j<60;j++){
            missileParticles.push({x:f.targetX+(Math.random()-0.5)*40,y:f.targetY+(Math.random()-0.5)*40,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:80+Math.random()*40,age:0,size:3+Math.random()*6,color:['#ff4444','#ffaa33','#ff6600','#ffcc00','#ff0000'][Math.floor(Math.random()*5)]});
          }
          if(typeof confetti==='function'){
            confetti({particleCount:150,spread:120,origin:{y:0.4},colors:['#ff0000','#ff4444','#ff6600','#ffaa33']});
          }
        }
      } else if(f.phase==='bombing'){
        f.timer++;
        // Bomber flies away
        f.x+=3;f.y-=1;
        cx.save();cx.translate(f.x,f.y);
        cx.fillStyle='#888';cx.beginPath();cx.moveTo(20,0);cx.lineTo(-10,-12);cx.lineTo(-15,0);cx.lineTo(-10,12);cx.closePath();cx.fill();
        cx.restore();
        if(f.timer>60){
          flyingObjects.splice(i,1);
          // Game over
          endGame();
        }
      }
    }
  }
}

function getStatements(type, country){
  const pool=STATEMENTS[type]||{};
  const specific=pool[country.name]||[];
  const defaults=pool['_default']||[];
  const combined=[...specific,...defaults];
  const shuffled=combined.sort(()=>Math.random()-0.5);
  return shuffled.slice(0,Math.min(3,shuffled.length));
}

function triggerSpecialEvent(){
  const evt=SPECIAL_EVENTS[Math.floor(Math.random()*SPECIAL_EVENTS.length)];

}

function showSpecialAnnounce(badge,text,color){
  const area=document.getElementById('toast-area');
  const isTrump=badge.includes('TRUTH');
  const toast=document.createElement('div');
  toast.className='toast '+(isTrump?'trump':'neutral');
  const lines=text.split('\n');
  toast.innerHTML=`<div class="toast-title">${lines[0]}</div>${lines[1]?'<div class="toast-stmt">'+lines[1]+'</div>':''}`;
  area.appendChild(toast);
  if(typeof baffle!=='undefined'){const b=baffle(toast.querySelector('.toast-title'),{characters:'█▓▒░',speed:isTrump?30:50});b.start();setTimeout(()=>b.reveal(isTrump?800:500),50);}
  if(typeof confetti==='function'&&isTrump){confetti({particleCount:30,spread:40,origin:{y:0.15},colors:['#ff6600','#ff4444','#ffaa33']});}
  setTimeout(()=>{if(toast.parentNode)toast.remove();},isTrump?5000:3500);
}

function showAnnounce(type, ship){
  if(type==='pass-ally'){stats.passed++;return;}

  if(type==='seize-enemy') stats.seized++;
  else if(type==='seize-ally') stats.allySeized++;
  else if(type==='pass-enemy') stats.enemyPassed++;

  const area=document.getElementById('toast-area');
  const cn=ship.country.name;
  const isGood=type==='seize-enemy';

  let titleText='',cls='';
  if(type==='seize-enemy'){titleText=`🎯 ${ship.flag} ${cn} 나포 성공! +${20*trumpBonusMultiplier}점`;cls='success';}
  else if(type==='seize-ally'){titleText=`⚠ ${ship.flag} ${cn} 동맹국 나포! HP-1`;cls='fail';}
  else if(type==='pass-enemy'){titleText=`⚠ ${ship.flag} ${cn} 적국 통과! HP-1`;cls='fail';}

  const chosen=getStatements(type,ship.country);
  const stmtHtml=chosen.map(t=>`<div class="toast-stmt">${t}</div>`).join('');

  const toast=document.createElement('div');
  toast.className='toast '+cls;
  toast.innerHTML=`<div class="toast-title">${titleText}</div>${stmtHtml}`;
  area.appendChild(toast);

  // Baffle effect on title
  const titleEl=toast.querySelector('.toast-title');
  if(typeof baffle!=='undefined'){
    const b=baffle(titleEl,{characters:'█▓▒░',speed:50});
    b.start();setTimeout(()=>b.reveal(600),100);
  }

  if(isGood && typeof confetti==='function'){
    confetti({particleCount:60,spread:60,origin:{y:0.7},colors:['#33ff33','#00aa44','#88ff88']});
  }

  // Auto-remove
  setTimeout(()=>{if(toast.parentNode)toast.remove();},4000);
}

function drawPoly(pts,fill,stroke,lw){
  cx.beginPath();
  cx.moveTo(pts[0][0]*W,pts[0][1]*H);
  for(let i=1;i<pts.length;i++) cx.lineTo(pts[i][0]*W,pts[i][1]*H);
  cx.closePath();
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();}
}

function drawMap(){
  // Deep ocean base
  cx.fillStyle='#081828';cx.fillRect(0,0,W,H);

  // Depth gradient — lighter near coasts (shallow), darker in center (deep channel)
  const straitGrd=cx.createRadialGradient(W*0.535,H*0.46,0,W*0.535,H*0.46,W*0.5);
  straitGrd.addColorStop(0,'rgba(15,50,80,0.4)');
  straitGrd.addColorStop(0.3,'rgba(10,35,60,0.3)');
  straitGrd.addColorStop(1,'rgba(8,24,40,0)');
  cx.fillStyle=straitGrd;cx.fillRect(0,0,W,H);

  // Shallow water near coasts — subtle lighter blue band
  cx.save();
  for(const coast of[IRAN,OMAN,MUSANDAM]){
    cx.beginPath();
    cx.moveTo(coast[0][0]*W,coast[0][1]*H);
    for(let i=1;i<coast.length;i++) cx.lineTo(coast[i][0]*W,coast[i][1]*H);
    cx.closePath();
    cx.lineWidth=25;cx.strokeStyle='rgba(20,60,90,0.25)';cx.stroke();
  }
  cx.restore();

  // Water grid (subtle)
  cx.strokeStyle='rgba(25,55,85,0.15)';cx.lineWidth=0.5;
  for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  // Land — sandy/desert tone for Middle East
  drawPoly(IRAN,'#2a3020','#4a6a3a',2);
  drawPoly(OMAN,'#2a3020','#4a6a3a',2);
  drawPoly(MUSANDAM,'#2e3424','#5a7a4a',2);
  drawPoly(QESHM,'#2e3424','#5a7a4a',1.5);

  // Inner land texture — lighter interior for depth
  cx.save();cx.globalAlpha=0.3;
  drawPoly(IRAN,'#3a4a30',null);
  drawPoly(OMAN,'#3a4a30',null);
  cx.restore();

  // Coastline glow — bright edge
  cx.save();
  for(const coast of[IRAN,OMAN,MUSANDAM,QESHM]){
    cx.beginPath();
    cx.moveTo(coast[0][0]*W,coast[0][1]*H);
    for(let i=1;i<coast.length;i++) cx.lineTo(coast[i][0]*W,coast[i][1]*H);
    cx.closePath();
    cx.shadowColor='rgba(60,180,100,0.3)';cx.shadowBlur=8;
    cx.strokeStyle='rgba(70,140,80,0.5)';cx.lineWidth=1.5;cx.stroke();
  }
  cx.shadowBlur=0;cx.restore();

  // Contour lines inside land (elevation feel)
  cx.save();cx.globalAlpha=0.08;
  const offsets=[0.01,0.02,0.03];
  for(const off of offsets){
    for(const [coast,dir] of[[IRAN,-1],[OMAN,1]]){
      cx.beginPath();
      for(let i=0;i<coast.length;i++){
        const x=coast[i][0]*W, y=coast[i][1]*H + dir*off*H*3;
        i===0?cx.moveTo(x,y):cx.lineTo(x,y);
      }
      cx.strokeStyle='#5a8a5a';cx.lineWidth=0.5;cx.stroke();
    }
  }
  cx.restore();

  // Labels
  cx.font='700 12px "Share Tech Mono"';cx.textAlign='center';
  cx.fillStyle='#5a8a50';
  cx.fillText('I R A N',W*0.35,H*0.14);
  cx.fillText('U A E',W*0.20,H*0.80);
  cx.fillText('O M A N',W*0.70,H*0.80);
  cx.font='9px "Share Tech Mono"';cx.fillStyle='#5a8a5066';
  cx.fillText('Musandam',W*0.535,H*0.62);
  cx.fillText('Qeshm Is.',W*0.48,H*0.355);
  // Water labels
  cx.fillStyle='#2a6090';cx.font='700 10px "Share Tech Mono"';
  cx.fillText('◀ PERSIAN GULF',W*0.10,H*0.50);
  cx.fillText('GULF OF OMAN ▶',W*0.90,H*0.50);
  cx.font='8px "Share Tech Mono"';cx.fillStyle='#2a609066';
  cx.fillText('Strait of Hormuz',W*0.535,H*0.475);

  // Shipping lanes
  cx.setLineDash([4,6]);cx.strokeStyle='rgba(40,90,140,0.2)';cx.lineWidth=1;
  for(const lane of[LANE_E,LANE_W]){
    cx.beginPath();
    for(let i=0;i<lane.length;i++){const x=lane[i][0]*W,y=lane[i][1]*H;i===0?cx.moveTo(x,y):cx.lineTo(x,y);}
    cx.stroke();
  }
  cx.setLineDash([]);

  // Radar sweep — 1 revolution per 4 seconds
  const t=Date.now()*0.001;
  const radarSpeed=Math.PI*0.5; // 1 rev per 4 sec
  radarAngle=(t*radarSpeed)%(Math.PI*2);
  const rCx=W*0.535,rCy=H*0.46,rR=W*0.35;

  // Sweep cone
  cx.save();cx.globalAlpha=0.05;
  cx.beginPath();cx.moveTo(rCx,rCy);cx.arc(rCx,rCy,rR,radarAngle,radarAngle+0.3);cx.closePath();
  cx.fillStyle='#33ff33';cx.fill();cx.restore();

  // Fading trail
  for(let i=1;i<=4;i++){
    cx.save();cx.globalAlpha=0.015*(1-i/5);
    cx.beginPath();cx.moveTo(rCx,rCy);cx.arc(rCx,rCy,rR,radarAngle-i*0.15,radarAngle-(i-1)*0.15);cx.closePath();
    cx.fillStyle='#33ff33';cx.fill();cx.restore();
  }

  // Radar line
  cx.save();cx.globalAlpha=0.15;
  cx.strokeStyle='#33ff33';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(rCx,rCy);
  cx.lineTo(rCx+Math.cos(radarAngle)*rR,rCy+Math.sin(radarAngle)*rR);
  cx.stroke();cx.restore();

  // Radar circle outline
  cx.save();cx.globalAlpha=0.04;
  cx.strokeStyle='#33ff33';cx.lineWidth=0.5;
  cx.beginPath();cx.arc(rCx,rCy,rR,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.arc(rCx,rCy,rR*0.5,0,Math.PI*2);cx.stroke();
  cx.restore();

  // Iran artillery batteries along coast
  const batteries=[[0.48,0.33],[0.54,0.34],[0.60,0.34],[0.44,0.34],[0.38,0.31]];
  const bt=Date.now()*0.001;
  for(const [bx,by] of batteries){
    const px=bx*W,py=by*H;
    cx.save();
    // Base
    cx.fillStyle='#3a4a30';
    cx.fillRect(px-6,py-3,12,6);
    cx.strokeStyle='#5a7a4a';cx.lineWidth=1;
    cx.strokeRect(px-6,py-3,12,6);
    // Barrel — rotates slowly, pointing toward strait
    const barrelAngle=Math.sin(bt*0.5+bx*10)*0.3+Math.PI*0.4;
    cx.translate(px,py);cx.rotate(barrelAngle);
    cx.fillStyle='#555';
    cx.fillRect(0,-1.5,14,3);
    cx.fillStyle='#666';
    cx.beginPath();cx.arc(0,0,4,0,Math.PI*2);cx.fill();
    cx.restore();
    // Label
    cx.font='6px "Share Tech Mono"';cx.fillStyle='#5a8a5044';cx.textAlign='center';
    cx.fillText('▲',px,py-8);
  }
}

function drawGate(){
  const gx=GATE.x*W, ty=GATE.topY*H, by=GATE.botY*H;
  const targetGA=gateOpen?1:0;
  gateAnim+=(targetGA-gateAnim)*0.07;
  const midY=(ty+by)/2;
  const halfLen=(by-ty)/2;
  const openGap=gateAnim*halfLen*0.45;

  // Concrete walls — thick, gray
  const wallW=8;
  const topArmEnd=midY-openGap;
  const botArmStart=midY+openGap;

  // Top wall (from top edge down)
  cx.fillStyle='#3a3a38';cx.strokeStyle='#555550';cx.lineWidth=1;
  cx.fillRect(gx-wallW/2, ty-10, wallW, topArmEnd-ty+10);
  cx.strokeRect(gx-wallW/2, ty-10, wallW, topArmEnd-ty+10);
  // Bottom wall (from bottom edge up)
  cx.fillRect(gx-wallW/2, botArmStart, wallW, by+10-botArmStart);
  cx.strokeRect(gx-wallW/2, botArmStart, wallW, by+10-botArmStart);

  // Concrete texture lines
  cx.strokeStyle='#4a4a4633';cx.lineWidth=0.5;
  for(let y=ty-10;y<topArmEnd;y+=6){cx.beginPath();cx.moveTo(gx-wallW/2,y);cx.lineTo(gx+wallW/2,y);cx.stroke();}
  for(let y=botArmStart;y<by+10;y+=6){cx.beginPath();cx.moveTo(gx-wallW/2,y);cx.lineTo(gx+wallW/2,y);cx.stroke();}

  // Gate tips — red when closed
  if(gateAnim<0.9){
    const tipCol=`rgba(255,68,68,${(1-gateAnim)*0.8})`;
    cx.fillStyle=tipCol;
    cx.fillRect(gx-wallW/2-2, topArmEnd-4, wallW+4, 4);
    cx.fillRect(gx-wallW/2-2, botArmStart, wallW+4, 4);
  }

  // Danger zone glow when closed
  if(gateAnim<0.5){
    const pulse=Math.sin(Date.now()*0.004)*0.3+0.5;
    cx.save();cx.globalAlpha=(1-gateAnim)*pulse*0.08;
    cx.fillStyle='#ff4444';
    cx.fillRect(gx-40, ty-10, 80, by-ty+20);
    cx.restore();
  }

  // Warning stripes in gap when closing
  if(gateAnim<0.7 && openGap>2){
    cx.save();cx.globalAlpha=(1-gateAnim)*0.4;
    cx.strokeStyle='#ff4444';cx.lineWidth=2;cx.setLineDash([4,4]);
    cx.beginPath();cx.moveTo(gx,topArmEnd);cx.lineTo(gx,botArmStart);cx.stroke();
    cx.setLineDash([]);cx.restore();
  }

  // Label
  cx.font='700 8px "Share Tech Mono"';
  cx.fillStyle=gateOpen?'#33ff3333':'#ff444466';
  cx.textAlign='center';
  cx.fillText('CHECKPOINT',gx,ty-16);
}

// Ship speech bubbles
const QUEUE_LINES=[
  '빨리 좀!','새치기 하지마!','야 비켜!','느려터졌네','뭐하는 거야',
  '기름값 오른다고!','통관 언제 되냐','해협 열어!','앞에 뭐야','짜증나네',
  '나 급한데...','VIP인데요','유조선 먼저!','소형이 끼어들지마','뒤로 가!',
  '전쟁나겠다','외교관 탔는데','핵 실었다','석유가 썩어','보험 올랐어',
];
let speechBubbles=[]; // {x,y,text,life,age,color}

function spawnSpeech(ship){
  if(speechBubbles.length>6) return;
  const text=QUEUE_LINES[Math.floor(Math.random()*QUEUE_LINES.length)];
  speechBubbles.push({
    shipId:ship.id,
    offsetY:-15*ship.sz.s,
    text,life:80+Math.random()*40,age:0,
    size:Math.max(8,9+ship.sz.s*2),
  });
}

function renderSpeechBubbles(){
  for(let i=speechBubbles.length-1;i>=0;i--){
    const b=speechBubbles[i];
    b.age++;
    if(b.age>=b.life){speechBubbles.splice(i,1);continue;}

    // Track the ship
    const ship=ships.find(s=>s.id===b.shipId);
    if(!ship||ship.state==='gone'||ship.opacity<=0){speechBubbles.splice(i,1);continue;}
    const sp=ship.pos();
    const bx=sp.x+Math.sin(b.age*0.12)*1.5;
    const by=sp.y+b.offsetY - b.age*0.3; // float up slowly

    const t=b.age/b.life;
    const alpha=t<0.08?t/0.08:(t>0.65?(1-(t-0.65)/0.35):1);

    cx.save();
    cx.globalAlpha=alpha*0.92;
    cx.font=`900 ${b.size}px "Noto Sans KR",sans-serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    const tw=cx.measureText(b.text).width;
    const padX=8,padY=5;
    const bw=tw+padX*2, bh=b.size+padY*2;

    const r=6;
    cx.fillStyle='rgba(255,255,255,0.92)';
    cx.strokeStyle='rgba(0,0,0,0.15)';cx.lineWidth=1;
    cx.beginPath();
    cx.moveTo(bx-bw/2+r,by-bh/2);
    cx.lineTo(bx+bw/2-r,by-bh/2);
    cx.quadraticCurveTo(bx+bw/2,by-bh/2,bx+bw/2,by-bh/2+r);
    cx.lineTo(bx+bw/2,by+bh/2-r);
    cx.quadraticCurveTo(bx+bw/2,by+bh/2,bx+bw/2-r,by+bh/2);
    cx.lineTo(bx+4,by+bh/2);
    cx.lineTo(bx,by+bh/2+7);
    cx.lineTo(bx-4,by+bh/2);
    cx.lineTo(bx-bw/2+r,by+bh/2);
    cx.quadraticCurveTo(bx-bw/2,by+bh/2,bx-bw/2,by+bh/2-r);
    cx.lineTo(bx-bw/2,by-bh/2+r);
    cx.quadraticCurveTo(bx-bw/2,by-bh/2,bx-bw/2+r,by-bh/2);
    cx.closePath();cx.fill();cx.stroke();

    cx.fillStyle='#1a1a1a';
    cx.fillText(b.text,bx,by);
    cx.restore();
  }
}

function drawShipShape(x,y,angle,sc,fill,stroke,flash,sizeIdx){
  cx.save();cx.translate(x,y);cx.rotate(angle);
  const fCol=flash>0?`rgba(255,68,68,${0.5+flash*0.5})`:fill;
  const sCol=flash>0?'#ff4444':stroke;
  cx.fillStyle=fCol;cx.strokeStyle=sCol;cx.lineWidth=1;

  if(sizeIdx===0){
    // Speedboat — small triangle
    const L=10*sc,BW=3.5*sc;
    cx.beginPath();
    cx.moveTo(L,0);cx.lineTo(-L*0.6,-BW);cx.lineTo(-L*0.4,0);cx.lineTo(-L*0.6,BW);
    cx.closePath();cx.fill();cx.stroke();
  } else if(sizeIdx===1){
    // Fishing/cargo — compact pentagon
    const L=14*sc,BW=4.5*sc;
    cx.beginPath();
    cx.moveTo(L,0);cx.lineTo(L*0.3,-BW);cx.lineTo(-L*0.5,-BW);
    cx.lineTo(-L*0.6,0);cx.lineTo(-L*0.5,BW);cx.lineTo(L*0.3,BW);
    cx.closePath();cx.fill();cx.stroke();
    // Small cabin
    cx.fillStyle=flash>0?'#ff6666':'rgba(15,30,45,0.7)';
    cx.fillRect(-L*0.1,-BW*0.5,L*0.2,BW);
  } else if(sizeIdx===2){
    // Container — long rectangle with pointed bow
    const L=20*sc,BW=5*sc;
    cx.beginPath();
    cx.moveTo(L,0);cx.lineTo(L*0.5,-BW);cx.lineTo(-L*0.5,-BW);
    cx.lineTo(-L*0.6,0);cx.lineTo(-L*0.5,BW);cx.lineTo(L*0.5,BW);
    cx.closePath();cx.fill();cx.stroke();
    // Container stacks
    cx.fillStyle=flash>0?'#ff6666':'rgba(20,50,40,0.6)';
    for(let i=0;i<3;i++) cx.fillRect(-L*0.35+i*L*0.22,-BW*0.6,L*0.18,BW*1.2);
    // Bridge at back
    cx.fillStyle='rgba(15,30,45,0.8)';
    cx.fillRect(-L*0.5,-BW*0.7,L*0.15,BW*1.4);
  } else if(sizeIdx===3){
    // Bulk carrier — rounded wide
    const L=24*sc,BW=7*sc;
    cx.beginPath();
    cx.moveTo(L,0);
    cx.quadraticCurveTo(L*0.6,-BW,-L*0.3,-BW);
    cx.lineTo(-L*0.6,-BW*0.5);cx.lineTo(-L*0.7,0);
    cx.lineTo(-L*0.6,BW*0.5);cx.lineTo(-L*0.3,BW);
    cx.quadraticCurveTo(L*0.6,BW,L,0);
    cx.closePath();cx.fill();cx.stroke();
    // Holds
    cx.fillStyle=flash>0?'#ff6666':'rgba(20,40,35,0.5)';
    cx.beginPath();cx.arc(-L*0.1,0,BW*0.5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(L*0.25,0,BW*0.4,0,Math.PI*2);cx.fill();
    // Bridge
    cx.fillStyle='rgba(15,30,45,0.8)';
    cx.fillRect(-L*0.55,-BW*0.6,L*0.12,BW*1.2);
  } else {
    // Supertanker — massive elongated oval
    const L=32*sc,BW=9*sc;
    cx.beginPath();
    cx.moveTo(L,0);
    cx.quadraticCurveTo(L*0.7,-BW,-L*0.2,-BW);
    cx.lineTo(-L*0.6,-BW*0.6);cx.quadraticCurveTo(-L*0.75,0,-L*0.6,BW*0.6);
    cx.lineTo(-L*0.2,BW);
    cx.quadraticCurveTo(L*0.7,BW,L,0);
    cx.closePath();cx.fill();cx.stroke();
    // Pipe runs
    cx.strokeStyle=flash>0?'#ff4444':'rgba(60,90,70,0.3)';cx.lineWidth=0.8;
    for(let i=-2;i<=2;i++){
      cx.beginPath();cx.moveTo(-L*0.4,i*BW*0.25);cx.lineTo(L*0.5,i*BW*0.25);cx.stroke();
    }
    // Bridge at stern
    cx.fillStyle='rgba(15,30,45,0.8)';
    cx.fillRect(-L*0.58,-BW*0.5,L*0.1,BW);
    // Mast
    cx.strokeStyle=flash>0?'#ff4444':'#33ff3333';
    cx.beginPath();cx.moveTo(-L*0.53,-BW-2*sc);cx.lineTo(-L*0.53,-BW-8*sc);cx.stroke();
  }

  cx.restore();
}

function renderShips(){
  const first=getFirst();
  for(const s of ships){
    if(s.state==='approaching'){const spd=s.baseSpeed*(activeEffect==='storm'?2.5:1);s.t+=spd;if(s.t>=s.gateT-0.02){
      // Iran ships auto-pass
      if(s.country.name==='이란'){
        s.state='transiting';
        gateOpen=true;gateOpenTimer=60;
        const area=document.getElementById('toast-area');
        const toast=document.createElement('div');toast.className='toast neutral';
        toast.innerHTML=`<div class="toast-title">${s.flag} 이란 선박 자동 통과</div>`;
        area.appendChild(toast);
        setTimeout(()=>{if(toast.parentNode)toast.remove();},2500);
      } else {
        s.state='queuing';s.t=s.gateT-0.02;reindexQueue();
      }
    }}
    else if(s.state==='queuing'){s.t+=(s.targetT-s.t)*0.03;s.vox+=(Math.random()-0.5)*0.5;s.voy+=(Math.random()-0.5)*0.4;
      // Random speech when jostling
      if(Math.random()<0.003) spawnSpeech(s);
    }
    else if(s.state==='deferring'){
      // Animate backward slowly
      s.t+=(s.deferTarget-s.t)*0.04;
      s.vox+=(Math.random()-0.5)*0.3;s.voy+=(Math.random()-0.5)*0.3;
      if(Math.abs(s.t-s.deferTarget)<0.005){
        s.state='approaching';
        s.t=s.deferTarget;
        reindexQueue();
      }
    }
    else if(s.state==='transiting'){s.t+=s.baseSpeed*2.5;if(s.t>1.05)s.state='gone';}
    else if(s.state==='sinking'){
      s.sinkTimer=(s.sinkTimer||0)+1;
      s.flash=Math.max(0,s.flash-0.005);
      s.sinkY+=0.3;
      s.opacity-=0.008;
      // Bubbles
      if(Math.random()<0.2){
        const sp=s.pos();
        smokeParticles.push({x:sp.x+(Math.random()-0.5)*10,y:sp.y,vx:(Math.random()-0.5)*0.3,vy:-0.5-Math.random()*0.3,life:30,age:0,size:1+Math.random()*2});
      }
      if(s.opacity<=0) s.state='gone';
    }
    else if(s.state==='seized'){
      s.flash=Math.max(0,s.flash-0.008);
      if(!s.seizeTargetX){
        const idx=seizedCount++;
        const row=idx%5;
        const col=Math.floor(idx/5);
        const startP=laneScr(s.lane,Math.max(0,s.t));
        s.seizeStartX=startP.x+s.ox;
        s.seizeStartY=startP.y+s.oy;
        s.seizeFinalX=(0.03+col*0.03)*W;
        s.seizeFinalY=(0.06+row*0.028)*H;
        s.seizeTargetX=s.seizeStartX;
        s.seizeTargetY=s.seizeStartY;
        s.seizeProgress=0;
      }
      s.seizeProgress=Math.min(1,s.seizeProgress+0.02);
      const ep=s.seizeProgress*s.seizeProgress*(3-2*s.seizeProgress); // smoothstep
      s.seizeTargetX=s.seizeStartX+(s.seizeFinalX-s.seizeStartX)*ep;
      s.seizeTargetY=s.seizeStartY+(s.seizeFinalY-s.seizeStartY)*ep;
      s.opacity=Math.max(0.8,s.opacity-0.001);
      s.vox=0;s.voy=0;
      if(s.seizeProgress>=0.95 && Math.random()<0.12){
        smokeParticles.push({x:s.seizeTargetX,y:s.seizeTargetY-6*s.sz.s,vx:(Math.random()-0.5)*0.4,vy:-0.3-Math.random()*0.4,life:50+Math.random()*30,age:0,size:2+Math.random()*3});
      }
    }
    else if(s.state==='gone'){s.opacity=0;}
    s.vox*=0.88;s.voy*=0.88;s.ox+=s.vox;s.oy+=s.voy;
    s.ox*=0.93;s.oy*=0.93;
    s.ox=Math.max(-20,Math.min(20,s.ox));s.oy=Math.max(-18,Math.min(18,s.oy));
  }
  resolveCollisions();
  const vis=ships.filter(s=>s.opacity>0&&s.t>-0.12);
  vis.sort((a,b)=>a.pos().y-b.pos().y);
  const t=Date.now()*0.001;
  for(const s of vis){
    const p=s.pos(),p2=laneScr(s.lane,Math.max(0,s.t+0.02));
    const angle=Math.atan2(p2.y-p.y,p2.x-p.x);
    const isF=(s===first);
    const fill=s.state==='seized'?'rgba(255,68,68,0.4)':(isF?'rgba(255,170,51,0.2)':'rgba(51,255,51,0.1)');
    const stroke=isF?'#ffaa33':'#33ff3355';
    cx.save();cx.globalAlpha=s.opacity;
    drawShipShape(p.x,p.y,angle,s.sz.s,fill,stroke,s.flash,SIZES.indexOf(s.sz));
    // No label for seized ships
    if(s.state!=='seized'){
      const fs=isF?11:9;
      cx.font=`700 ${fs}px "Noto Sans KR","Share Tech Mono",sans-serif`;
      cx.textAlign='center';
      cx.fillStyle=s.flash>0?'#ff4444':(isF?'#ffaa33':'#33ff33aa');

      // Scramble effect — reveal only when radar sweeps over or in strait zone
      let displayLabel=s.label;
      const GLITCH='█▓▒░◆◇■□▲△';
      if(s.state==='approaching'||s.state==='deferring'){
        // Check if radar has recently swept this ship
        const sp=s.pos();
        const rCx=W*0.535,rCy=H*0.46,rR=W*0.35;
        const dx=sp.x-rCx,dy=sp.y-rCy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const shipAngle=(Math.atan2(dy,dx)+Math.PI*2)%(Math.PI*2);
        const angleDiff=((shipAngle-radarAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);

        // Ship is "detected" if radar swept it recently (within last 0.5 rad) AND within radar range
        const detected=dist<rR && angleDiff>Math.PI*1.5; // radar just passed
        // Also detect if very close to gate
        const nearGate=s.t/(s.gateT-0.02);

        if(!s.radarDetected && detected) s.radarDetected=true;

        const reveal=s.radarDetected ? Math.max(nearGate, 0.5) : Math.min(nearGate, 0.15);
        const revealCount=Math.floor(Math.max(0,Math.min(1,reveal))*s.label.length);
        const chars=[...s.label];
        for(let ci=revealCount;ci<chars.length;ci++){
          if(chars[ci]!==' ') chars[ci]=GLITCH[Math.floor(Math.random()*GLITCH.length)];
        }
        displayLabel=chars.join('');
      }

      cx.fillText(`${s.flag} ${displayLabel}`,p.x,p.y-12*s.sz.s);
      if(isF&&Math.sin(t*6)>0){
        cx.fillStyle='#ffaa33';cx.beginPath();
        cx.arc(p.x-cx.measureText(`${s.flag} ${displayLabel}`).width/2-6,p.y-12*s.sz.s,2.5,0,Math.PI*2);cx.fill();
      }
    }
    cx.restore();
  }
  ships=ships.filter(s=>s.opacity>0);

  // Render smoke particles
  for(let i=smokeParticles.length-1;i>=0;i--){
    const p=smokeParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.age++;
    if(p.age>=p.life){smokeParticles.splice(i,1);continue;}
    const t=p.age/p.life;
    cx.save();
    cx.globalAlpha=(1-t)*0.25;
    cx.fillStyle='#888';
    cx.beginPath();
    cx.arc(p.x,p.y,p.size*(1+t*2),0,Math.PI*2);
    cx.fill();
    cx.restore();
  }
  if(smokeParticles.length>200) smokeParticles.splice(0,smokeParticles.length-200);

  // Speech bubbles
  renderSpeechBubbles();

  // Missile/explosion particles
  for(let i=missileParticles.length-1;i>=0;i--){
    const p=missileParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.age++;
    if(p.age>=p.life){missileParticles.splice(i,1);continue;}
    const t=p.age/p.life;
    cx.save();cx.globalAlpha=(1-t)*0.8;
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x,p.y,p.size*(1-t*0.5),0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

function loop(){
  if(!gameOver){
    if(!alliancePhase){
      document.getElementById('timer').textContent=Math.max(0,nextAllianceAt-processedCount);
      // Clear expired effects
      if(activeEffect && Date.now()>effectEndTime) activeEffect=null;
      spawnAcc++;
      const rate=Math.max(200,450-score*0.6);
      if(spawnAcc>=rate){spawnAcc=0;spawnShip();}
      // Trump check — independent of announce state
      checkTrumpEvent();
    }
    updateLabel();
  }
  // Gate auto-close
  if(gateOpenTimer>0){
    gateOpenTimer--;
    if(gateOpenTimer<=0) gateOpen=false;
  }
  drawMap();drawGate();renderShips();updateFlyingObjects();
  requestAnimationFrame(loop);
}

const introHint=document.getElementById('intro-hint');

if(typeof baffle!=='undefined'){
  const b=baffle(introHL,{characters:'█▓▒░<>/',speed:80});
  b.start();
  setTimeout(()=>b.reveal(1500),500);
  const b2=baffle(introSub,{characters:'·•◦○',speed:60});
  b2.start();
  setTimeout(()=>b2.reveal(1000),1500);
}
setTimeout(()=>{introHint.textContent='Enter를 눌러 시작';},3000);

// Draw map in background during intro
function introLoop(){
  if(gameStarted) return;
  drawMap();drawGate();
  requestAnimationFrame(introLoop);
}
introLoop();

document.addEventListener('keydown',function introKey(e){
  if(e.key==='Enter' && !gameStarted){
    e.preventDefault();
    gameStarted=true;
    document.getElementById('intro-overlay').classList.add('hide');
    setTimeout(()=>{document.getElementById('intro-overlay').style.display='none';},800);
    // Start game
    for(let i=0;i<4;i++)spawnShip();
    inputEl.focus();
    loop();
    document.removeEventListener('keydown',introKey);
  }
});
</script>
</body>
</html>
