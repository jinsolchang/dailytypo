<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청룡기획사 · TOTAL DESIGNER · 010-6614-6449</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=DotGothic16&family=Silkscreen:wght@400;700&display=swap');
@font-face{
  font-family:'Galmuri';
  src:url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/Galmuri11.woff2') format('woff2');
  font-weight:normal;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'Galmuri14';
  src:url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/Galmuri14.woff2') format('woff2');
  font-weight:normal;font-style:normal;font-display:swap;
}

/* ── 순수 흑백 픽셀 톤 ── */
:root{
  --bg:#c0c0c0;              /* Win3.1 회색 */
  --bg-alt:#dcdcdc;
  --light:#ffffff;
  --dark:#808080;
  --darker:#505050;
  --ink:#000000;
  --title:#000000;           /* 타이틀바: 순흑 */
  --title-2:#2a2a2a;
  --title-text:#ffffff;
  --accent:#000000;

  --font-ui:'Galmuri','DotGothic16','Nanum Gothic',monospace;
  --font-big:'Galmuri14','Galmuri','DotGothic16',monospace;
  --font-myeong:'Nanum Myeongjo','Gowun Batang',Batang,serif;
  --font-dot:'Galmuri','DotGothic16',monospace;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font-ui);color:#fff;image-rendering:pixelated;-webkit-font-smoothing:none;font-smooth:never}

/* ── 배경 사진 (흑백 고정) ── */
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:default;background:#0a0a0a}
.img-wrap{position:relative;max-width:100%;max-height:100%;aspect-ratio:4000/2662}
.img-wrap img{display:block;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;filter:grayscale(1) contrast(1.05) brightness(0.96);image-rendering:auto}

/* ── 스포트라이트 (흑백) ── */
.spotlight{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity 0.5s;
  background:radial-gradient(circle var(--r,200px) at var(--mx,50%) var(--my,50%),
    transparent 0%,
    transparent 55%,
    rgba(0,0,0,0.4) 100%);
  mix-blend-mode:multiply}
.spotlight.active{opacity:1}

/* ── hotspot ── */
.hotspot{position:absolute;cursor:pointer;z-index:3;background:transparent}
.hotspot::after{content:'';position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px 0 0 -3px;background:#fff;box-shadow:0 0 0 1px #000,0 0 0 3px #fff,0 0 0 4px #000;opacity:0;transition:opacity 0.2s}
.hotspot:hover::after{opacity:1;animation:blip 0.9s steps(2,end) infinite}
@keyframes blip{0%,50%{opacity:1}51%,100%{opacity:0}}

/* ── 모달 오버레이 (디더 패턴) ── */
.win-overlay{position:fixed;inset:0;z-index:20;
  background:rgba(0,0,0,0.55);
  display:none;align-items:center;justify-content:center;padding:20px}
.win-overlay.visible{display:flex;animation:fadeIn 0.1s step-end}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── 픽셀 창 (흑백) ── */
.win{font-family:var(--font-ui);background:var(--bg);color:var(--ink);
  border-top:2px solid var(--light);border-left:2px solid var(--light);
  border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);
  box-shadow:
    inset -1px -1px 0 var(--dark),
    inset 1px 1px 0 var(--bg-alt),
    6px 6px 0 #000;
  min-width:400px;max-width:92vw;max-height:86vh;display:flex;flex-direction:column;
  animation:winPop 0.12s step-end;
  image-rendering:pixelated}
@keyframes winPop{0%{opacity:0;transform:translate(2px,2px)}100%{opacity:1;transform:translate(0,0)}}

.win .titlebar{background:var(--title);color:var(--title-text);padding:3px 5px 3px 7px;display:flex;justify-content:space-between;align-items:center;font-weight:normal;font-size:0.8rem;font-family:var(--font-dot);margin:2px;letter-spacing:0}
.win .titlebar .ttl{display:flex;gap:6px;align-items:center}
.win .titlebar .icon{font-family:var(--font-dot)}
.win .titlebar .btns{display:flex;gap:2px}
.win .titlebar .btn{width:20px;height:18px;background:var(--bg);color:var(--ink);
  border-top:2px solid var(--light);border-left:2px solid var(--light);
  border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);
  font-family:var(--font-dot);font-size:0.75rem;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.win .titlebar .btn:active{border-top:2px solid var(--ink);border-left:2px solid var(--ink);border-right:2px solid var(--light);border-bottom:2px solid var(--light)}

.win .menubar{background:var(--bg);border-bottom:1px solid var(--ink);padding:2px 6px;font-size:0.8rem;color:var(--ink);display:flex;gap:10px;font-family:var(--font-ui)}
.win .menubar span{cursor:pointer;padding:1px 6px}
.win .menubar span:hover{background:var(--ink);color:#fff}

.win .body{padding:16px;overflow:auto;flex:1;background:var(--bg);border-top:1px solid var(--light)}
.win .body h2{font-family:var(--font-big);font-size:1.2rem;margin-bottom:10px;color:var(--ink);letter-spacing:0;line-height:1.3}
.win .body h3{font-family:var(--font-big);font-size:0.95rem;margin-bottom:6px;color:var(--ink)}
.win .body p{font-size:0.88rem;line-height:1.7;margin-bottom:8px;color:var(--ink);font-family:var(--font-ui)}
.win .body .sub{font-size:0.78rem;color:var(--darker);font-family:var(--font-ui)}
.win .body .line{border:0;border-top:1px dashed var(--ink);margin:12px 0}

.panel-in{background:var(--light);border-top:1px solid var(--ink);border-left:1px solid var(--ink);border-right:1px solid var(--light);border-bottom:1px solid var(--light);padding:10px}

/* 버튼 */
.win-button{display:inline-block;background:var(--bg);color:var(--ink);
  border-top:2px solid var(--light);border-left:2px solid var(--light);
  border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);
  border-radius:0;padding:5px 16px;font-family:var(--font-ui);font-size:0.85rem;cursor:pointer;min-width:80px;letter-spacing:0;
  box-shadow:inset 1px 1px 0 var(--bg-alt)}
.win-button:hover{background:var(--bg-alt)}
.win-button:active{border-top:2px solid var(--ink);border-left:2px solid var(--ink);border-right:2px solid var(--light);border-bottom:2px solid var(--light);padding:6px 15px 4px 17px}
.win-button.primary{background:var(--ink);color:#fff;border-top-color:#555;border-left-color:#555;border-right-color:#000;border-bottom-color:#000}
.win-button.primary:hover{background:var(--title-2)}
.win-button.destructive{background:var(--ink);color:#fff;border-top-color:#555;border-left-color:#555;border-right-color:#000;border-bottom-color:#000}

.win .statusbar{background:var(--bg);border-top:1px solid var(--dark);padding:3px 5px;display:flex;gap:4px;font-size:0.75rem;color:var(--ink);font-family:var(--font-ui)}
.win .statusbar div{background:var(--bg);border-top:1px solid var(--darker);border-left:1px solid var(--darker);border-right:1px solid var(--light);border-bottom:1px solid var(--light);padding:2px 10px;min-width:70px}

/* 입력 */
.win input[type="text"],.win textarea,.win select{width:100%;background:var(--light);
  border-top:2px solid var(--ink);border-left:2px solid var(--ink);
  border-right:2px solid var(--light);border-bottom:2px solid var(--light);
  border-radius:0;padding:4px 7px;font-family:var(--font-ui);font-size:0.85rem;color:var(--ink);outline:none;margin-bottom:10px}
.win input[type="text"]:focus,.win textarea:focus,.win select:focus{background:#f0f0f0}
.win textarea{resize:vertical;min-height:70px}
.win label{display:block;font-size:0.82rem;margin-bottom:4px;color:var(--ink);font-family:var(--font-ui)}

/* ── 각 창 전용 (전부 흑백) ── */

.bell-notice{text-align:center;padding:14px 8px}
.bell-notice .icon{font-size:3.2rem;margin-bottom:14px;animation:bellShake 0.5s steps(4,end) infinite;display:inline-block;filter:grayscale(1)}
@keyframes bellShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}75%{transform:rotate(14deg)}}

.call-ui{text-align:center;padding:12px 6px;min-width:320px}
.call-ui .avatar{width:84px;height:84px;background:var(--ink);color:#fff;border-radius:0;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:2.4rem;font-family:var(--font-big);border:2px solid var(--ink);box-shadow:4px 4px 0 var(--dark)}
.call-ui .num{font-family:var(--font-big);font-size:1.4rem;color:var(--ink);margin-bottom:4px;letter-spacing:0.05em}
.call-ui .status{font-size:0.84rem;color:var(--ink);margin-bottom:4px;font-family:var(--font-ui)}
.call-ui .status .dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.call-ui .timer{font-family:var(--font-big);font-size:0.95rem;color:#fff;margin-top:10px;background:#000;padding:4px 10px;display:inline-block;border:2px inset var(--dark)}
.call-ui .call-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}

.portfolio{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;min-width:460px}
.portfolio .card{background:var(--light);border-top:2px solid var(--ink);border-left:2px solid var(--ink);border-right:2px solid var(--light);border-bottom:2px solid var(--light);padding:4px;cursor:pointer;transition:none}
.portfolio .card:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink)}
.portfolio .thumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-family:var(--font-big);font-size:1.2rem;color:#fff;background:var(--ink);letter-spacing:0;text-align:center;line-height:1.15;padding:8px}
.portfolio .card:nth-child(3n-1) .thumb{background:#333}
.portfolio .card:nth-child(3n) .thumb{background:#666}
.portfolio .name{font-size:0.78rem;padding:5px 2px 2px;text-align:center;color:var(--ink);font-family:var(--font-ui)}

.cert{text-align:center;padding:12px 6px;min-width:380px;font-family:var(--font-myeong)}
.cert h3{font-family:var(--font-big);font-size:1.3rem;color:var(--ink);margin-bottom:4px;letter-spacing:0.3em}
.cert .rows{text-align:left;margin:16px 0;font-size:0.88rem;line-height:2;font-family:var(--font-myeong)}
.cert .rows .row{display:flex;border-bottom:1px dotted var(--ink);padding:4px 0}
.cert .rows .k{width:100px;color:var(--darker);font-family:var(--font-ui);font-size:0.8rem}
.cert .stamp{display:inline-block;font-family:var(--font-big);color:var(--ink);border:3px double var(--ink);padding:12px 20px;border-radius:50%/40%;font-size:1rem;letter-spacing:0.2em;transform:rotate(-8deg);margin-top:10px;background:transparent}

.brandcard{padding:12px 6px;min-width:360px}
.brandcard .dragonbox{background:#000;padding:30px;border:2px inset var(--dark)}
.brandcard .dragonbox svg{width:100%;max-width:280px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto}
.brandcard .dragonbox svg path,.brandcard .dragonbox svg circle{stroke-dasharray:2000;stroke-dashoffset:2000;animation:draw 2s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.brandcard .info{margin-top:14px;text-align:left}
.brandcard .info p{font-family:var(--font-myeong);font-size:0.9rem;line-height:1.75}

.service-list{min-width:460px}
.service-list table{width:100%;border-collapse:collapse;font-size:0.84rem;font-family:var(--font-ui);background:var(--light)}
.service-list th,.service-list td{padding:6px 10px;border:1px solid var(--ink);text-align:left}
.service-list th{background:var(--ink);color:#fff;font-family:var(--font-dot);font-size:0.8rem;letter-spacing:0}
.service-list tbody tr:nth-child(even) td{background:#e4e4e4}
.service-list tbody tr:hover td{background:#ffffc0}
.service-list .price{text-align:right;font-family:var(--font-big)}

.intro{min-width:480px;max-width:540px}
.intro .hero{background:#000;color:#fff;padding:26px 20px;text-align:center;margin-bottom:14px;border:2px inset var(--dark)}
.intro .hero .ko{font-family:var(--font-big);font-size:2.8rem;line-height:1;color:#fff;letter-spacing:0.1em}
.intro .hero .en{font-family:var(--font-dot);font-size:0.8rem;letter-spacing:0.4em;margin-top:10px;color:#ccc}
.intro .body-text{font-family:var(--font-myeong);font-size:0.92rem;line-height:1.85;color:var(--ink);padding:4px 4px}
.intro .body-text p{font-family:var(--font-myeong)}
.intro .body-text .sub{font-family:var(--font-ui);font-size:0.78rem;color:var(--darker)}
.intro .sig{text-align:right;font-family:var(--font-myeong);font-weight:800;font-size:1.1rem;margin-top:12px;color:var(--ink)}

.cat-table{min-width:440px}
.cat-table .row{display:grid;grid-template-columns:56px 1fr 100px;gap:10px;padding:8px 8px;border-bottom:1px dashed var(--ink);font-size:0.86rem;align-items:center;font-family:var(--font-ui)}
.cat-table .row:hover{background:#ffffc0}
.cat-table .row .n{font-family:var(--font-dot);color:var(--ink)}
.cat-table .row .t{color:var(--ink);font-weight:700}
.cat-table .row .d{color:var(--darker);font-size:0.76rem;margin-top:2px}
.cat-table .row .p{text-align:right;color:var(--ink);font-family:var(--font-dot);font-size:0.82rem}

.motto{min-width:400px;text-align:center;padding:10px}
.motto .frame{background:#fff;border:10px ridge var(--darker);padding:32px 20px;box-shadow:inset 0 0 0 3px var(--ink),4px 4px 0 var(--ink)}
.motto .frame .big{font-family:var(--font-myeong);font-weight:800;font-size:2.1rem;color:var(--ink);letter-spacing:0.02em;line-height:1.35;margin-bottom:12px}
.motto .frame .en{font-family:var(--font-dot);letter-spacing:0.5em;color:var(--ink);font-size:0.78rem}

.booking{min-width:440px}
.booking .req{color:var(--ink);margin-left:3px}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:220px;margin:12px auto}
.keypad button{background:var(--bg);color:var(--ink);
  border-top:2px solid var(--light);border-left:2px solid var(--light);
  border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);
  border-radius:0;padding:10px;font-family:var(--font-big);font-size:1.1rem;cursor:pointer}
.keypad button:hover{background:var(--bg-alt)}
.keypad button:active{border-top:2px solid var(--ink);border-left:2px solid var(--ink);border-right:2px solid var(--light);border-bottom:2px solid var(--light)}

.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--bg);color:var(--ink);
  border-top:2px solid var(--light);border-left:2px solid var(--light);
  border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);
  border-radius:0;padding:12px 20px;font-family:var(--font-ui);font-size:0.85rem;z-index:30;
  box-shadow:4px 4px 0 var(--ink);animation:toastIn 0.12s step-end}
@keyframes toastIn{from{opacity:0}to{opacity:1}}
</style>
</head>

<div class="stage" id="stage">
  <div class="img-wrap" id="imgwrap">
    <img id="bgimg" src="L1030722.jpg" alt="청룡기획사">
    <!-- hotspots -->
    <div class="hotspot" data-key="bell"    style="left:48.20%;top:3.92%;width:6.00%;height:9.00%"></div>
    <div class="hotspot" data-key="ad"      style="left:26.37%;top:21.72%;width:11.87%;height:15.59%"></div>

  </div>
</div>

<!-- 스포트라이트 (마우스 따라감) -->
<div class="spotlight" id="spotlight"></div>

<!-- 모달 -->
<div class="win-overlay" id="overlay"></div>

<script>
// ── 모달 열기/닫기 ──
const overlay = document.getElementById('overlay');

function openWin(config) {
  const { title, icon='■', menubar=['파일(F)','편집(E)','보기(V)','도움말(H)'], body, status=['READY'] } = config;
  overlay.innerHTML = `
    <div class="win" onclick="event.stopPropagation()">
      <div class="titlebar">
        <span class="ttl"><span class="icon">${icon}</span>${title}</span>
        <span class="btns">
          <button class="btn" title="최소화" onclick="closeWin()">_</button>
          <button class="btn" title="최대화" onclick="closeWin()">□</button>
          <button class="btn" title="닫기" onclick="closeWin()">×</button>
        </span>
      </div>
      <div class="menubar">${menubar.map(m=>`<span>${m}</span>`).join('')}</div>
      <div class="body">${body}</div>
      <div class="statusbar">${status.map(s=>`<div>${s}</div>`).join('')}</div>
    </div>
  `;
  overlay.classList.add('visible');
}
function closeWin() {
  overlay.classList.remove('visible');
  overlay.innerHTML = '';
  // 통화 타이머 등 리소스 정리
  if (window._callTimer) { clearInterval(window._callTimer); window._callTimer = null; }
}
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeWin(); });
addEventListener('keydown', (e) => { if (e.key === 'Escape') closeWin(); });

// ── 토스트 ──
function toast(msg, ms=2000) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

// ── 렌더러 ──
const RENDERERS = {
  // 01 초인종: 방문자 알림
  bell() {
    openWin({
      title: '방문자 알림 — NOTICE.EXE',
      icon: '🔔',
      menubar: ['파일(F)','편집(E)','도움말(H)'],
      body: `
        <div class="bell-notice">
          <div class="icon">🔔</div>
          <h2>손님이 오셨습니다</h2>
          <p>초인종이 울렸습니다. 카운터로 이동해주세요.</p>
          <p class="sub">— 접수 시각: ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</p>
          <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
            <button class="win-button primary" onclick="toast('접수 완료되었습니다.');closeWin()">응답</button>
            <button class="win-button" onclick="closeWin()">나중에</button>
          </div>
        </div>`,
      status: ['접수 대기 1건','09:00-19:00 영업중']
    });
  },

  // 02 광고기획: 업무 카테고리 표
  ad() {
    openWin({
      title: '업무 카테고리 — CATEGORY.DAT',
      icon: '📋',
      body: `
        <h2>청룡기획사 업무 분야</h2>
        <p class="sub">원하시는 항목을 클릭하면 샘플을 보여드립니다.</p>
        <div class="line"></div>
        <div class="cat-table">
          ${[
            ['01','간판 · 사인물','실사출력 · LED · 네온 · 시트지 시공','40,000원~'],
            ['02','현수막','행사 · 개업 · 분양 · 선거','8,000원~'],

// ── hotspot 바인딩 ──
document.querySelectorAll('.hotspot').forEach(h => {
  h.addEventListener('click', (e) => {
    e.stopPropagation();
    const key = h.dataset.key;
    RENDERERS[key] && RENDERERS[key]();
  });
});

// ── 스포트라이트: hotspot 위에서만 활성 ──
const spotlight = document.getElementById('spotlight');
let spotActive = false;
document.querySelectorAll('.hotspot').forEach(h => {
  h.addEventListener('mouseenter', () => {
    spotActive = true;
    spotlight.classList.add('active');
  });
  h.addEventListener('mouseleave', () => {
    spotActive = false;
    spotlight.classList.remove('active');
  });
});
addEventListener('mousemove', (e) => {
  if (!spotActive) return;
  spotlight.style.setProperty('--mx', e.clientX + 'px');
  spotlight.style.setProperty('--my', e.clientY + 'px');
});
</script>
