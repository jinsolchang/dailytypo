<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청룡 — 예술을 창조하는 기업</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700;900&family=Black+Han+Sans&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#b8b5ad;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;cursor:crosshair}
#stage{position:fixed;inset:0}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* 간판 프레임 */
.frame{position:fixed;inset:24px;border:2px solid #2a2a2a;pointer-events:none;z-index:2;mix-blend-mode:multiply}
.frame::before{content:'';position:absolute;inset:8px;border:1px solid rgba(0,0,0,0.25)}
.rivet{position:fixed;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#555,#0a0a0a);z-index:3;pointer-events:none}
.r1{top:18px;left:18px}.r2{top:18px;right:18px}.r3{bottom:18px;left:18px}.r4{bottom:18px;right:18px}

/* 헤드 */
.topbar{position:fixed;top:0;left:0;right:0;padding:14px 40px;z-index:5;display:flex;justify-content:space-between;align-items:center;font-size:0.7rem;letter-spacing:0.18em;color:#1a1a1a;mix-blend-mode:multiply}
.topbar a{color:#1a1a1a;text-decoration:none;border-bottom:1px solid rgba(0,0,0,0.4);padding-bottom:2px}

/* 중앙 타이포 레이어 */
.headline{position:fixed;inset:0;z-index:4;pointer-events:none;display:flex;align-items:center;justify-content:center}
.h-wrap{position:relative;text-align:center;color:#1a1a1a;mix-blend-mode:multiply}

.eyebrow{font-size:clamp(0.9rem,1.6vw,1.2rem);font-weight:700;letter-spacing:0.12em;margin-bottom:14px;opacity:0.85;white-space:nowrap}
.eyebrow .dash{display:inline-block;width:40px;height:2px;background:#1a1a1a;vertical-align:middle;margin-left:10px;transform:translateY(-3px)}

.hangul{font-family:'Black Han Sans',sans-serif;font-size:clamp(7rem,18vw,16rem);line-height:0.88;letter-spacing:0.02em;font-weight:900;color:#141414;position:relative;display:inline-block}
.hangul .ch{display:inline-block;transition:transform 0.25s cubic-bezier(.2,.8,.2,1)}

.latin{margin-top:18px;font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,3.5vw,2.6rem);letter-spacing:0.32em;font-weight:400;color:#222}
.latin .dot{display:inline-block;width:8px;height:8px;background:#222;border-radius:50%;margin:0 10px;vertical-align:middle;transform:translateY(-5px)}

.ellipse{margin-top:22px;display:inline-block;padding:10px 36px;border:2px solid #1a1a1a;border-radius:100px;font-size:clamp(1rem,1.8vw,1.35rem);font-weight:900;letter-spacing:0.55em;padding-right:21px}

.tagbottom{margin-top:18px;font-size:clamp(0.75rem,1.1vw,0.9rem);letter-spacing:0.42em;font-weight:700;display:flex;gap:18px;justify-content:center;align-items:center}
.tagbottom .mark{display:inline-block;width:20px;height:20px;border:2px solid #1a1a1a;border-radius:50%;position:relative}
.tagbottom .mark::after{content:'';position:absolute;inset:3px;border:2px solid #1a1a1a;border-radius:50%}

/* 사이드 세로 한글 */
.sideko{position:fixed;top:50%;right:46px;transform:translateY(-50%);writing-mode:vertical-rl;font-family:'Black Han Sans',sans-serif;font-size:clamp(2rem,4vw,3.4rem);letter-spacing:0.15em;color:#1a1a1a;opacity:0.8;mix-blend-mode:multiply;z-index:4;pointer-events:none;line-height:1}
.sideko2{position:fixed;top:50%;left:46px;transform:translateY(-50%);writing-mode:vertical-rl;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:clamp(1.1rem,1.8vw,1.5rem);letter-spacing:0.35em;color:#1a1a1a;opacity:0.7;mix-blend-mode:multiply;z-index:4;pointer-events:none}

/* 번호 스티커 */
.sticker{position:fixed;left:60px;top:120px;background:#fafaf4;border:1px solid #444;padding:8px 14px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.08em;color:#1a1a1a;z-index:5;transform:rotate(-2deg);box-shadow:2px 3px 0 rgba(0,0,0,0.15);mix-blend-mode:multiply;pointer-events:none}
.sticker small{display:block;font-family:'Noto Sans KR';font-size:0.6rem;font-weight:700;letter-spacing:0.2em;margin-top:2px}

.phone{position:fixed;bottom:70px;left:60px;font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3rem);letter-spacing:0.12em;color:#1a1a1a;opacity:0.7;mix-blend-mode:multiply;z-index:4;pointer-events:none;line-height:0.9}
.phone small{display:block;font-family:'Noto Sans KR';font-size:0.6rem;font-weight:700;letter-spacing:0.3em;opacity:0.8;margin-bottom:4px}

/* 자막 */
.caption{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:6;font-size:0.85rem;letter-spacing:0.15em;color:#1a1a1a;mix-blend-mode:multiply;text-align:center;font-weight:700;background:rgba(232,228,218,0.6);padding:8px 20px;border:1px solid rgba(0,0,0,0.3);max-width:90vw}

/* 프로그레스 */
.progress{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:6;width:240px;height:3px;background:rgba(0,0,0,0.15)}
.progress-bar{height:100%;background:#1a1a1a;width:0%}
.progress-label{position:absolute;top:-18px;left:0;font-size:0.55rem;letter-spacing:0.3em;font-weight:700;color:#1a1a1a}

/* 힌트 */
.hint{position:fixed;bottom:40px;right:40px;z-index:6;font-size:0.65rem;letter-spacing:0.3em;color:#1a1a1a;mix-blend-mode:multiply;opacity:0.6;font-weight:700}

/* 글리치 */
.shake{animation:shake 0.4s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-3px,2px)}
  40%{transform:translate(3px,-2px)}
  60%{transform:translate(-2px,-2px)}
  80%{transform:translate(2px,2px)}
}
</style>
</head>
<body>

<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="cracks"></canvas>
  <canvas id="dragon"></canvas>
  <canvas id="particles"></canvas>
</div>

<div class="frame"></div>
<div class="rivet r1"></div><div class="rivet r2"></div><div class="rivet r3"></div><div class="rivet r4"></div>

<div class="topbar">
  <div>NEWSROOM · 2026.04.24</div>
  <div><a href="../index.html">← 목록으로</a></div>
</div>

<div class="progress">
  <div class="progress-label">ARCHIVE · 청룡</div>
  <div class="progress-bar" id="pbar"></div>
</div>

<div class="sticker">
  <div>AD-6449</div>
  <small>광고 · AD</small>
</div>

<div class="sideko2">한국 · 전주 · 휴대폰</div>

<div class="headline" id="headline">
  <div class="h-wrap" id="hwrap">
    <div class="eyebrow">예술을 창조하는 기업<span class="dash"></span></div>
    <div class="hangul" id="hangul">
      <span class="ch">청</span><span class="ch">룡</span>
    </div>
    <div class="latin">TOTAL<span class="dot"></span>DESIGNER</div>
    <div class="ellipse">기 획 사</div>
    <div class="tagbottom"><span class="mark"></span>광고 · 디자인<span class="mark"></span></div>
  </div>
</div>

<div class="sideko">광고기획</div>

<div class="phone">
  <small>역 락 처</small>
  010-6614-6449
</div>

<div class="caption" id="caption">사라진 간판은 시대의 그래픽 아카이브입니다</div>

<div class="hint">CLICK · 간판을 두드려 보세요</div>

<script>
const DURATION = 60000;
const startT = Date.now();

// ── 배경: 시트지 질감 ──
(function(){
  const cv = document.getElementById('bg');
  function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;}
  resize(); addEventListener('resize', resize);
  const cx = cv.getContext('2d');
  const W = ()=>cv.width, H = ()=>cv.height;

  // 고정된 노이즈 그리기 (시트지 종이 느낌)
  function drawNoise(){
    const g = cx.createLinearGradient(0,0,W(),H());
    g.addColorStop(0,'#c7c3b8');
    g.addColorStop(0.5,'#b5b1a5');
    g.addColorStop(1,'#a8a497');
    cx.fillStyle = g; cx.fillRect(0,0,W(),H());

    // 그레인
    const img = cx.getImageData(0,0,W(),H());
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random()-0.5)*38;
      d[i]=Math.max(0,Math.min(255,d[i]+n));
      d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
      d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
    }
    cx.putImageData(img,0,0);

    // 얼룩
    for (let i = 0; i < 14; i++) {
      const x = Math.random()*W(), y = Math.random()*H();
      const r = 80 + Math.random()*240;
      const rg = cx.createRadialGradient(x,y,0,x,y,r);
      rg.addColorStop(0,'rgba(60,50,40,0.15)');
      rg.addColorStop(1,'rgba(60,50,40,0)');
      cx.fillStyle = rg; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
    }
  }
  drawNoise();
  addEventListener('resize',()=>setTimeout(drawNoise,50));
})();

// ── 균열 라인 ──
(function(){
  const cv = document.getElementById('cracks');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize(); addEventListener('resize', resize);
  const cx = cv.getContext('2d');

  const cracks = [];

  function seedCracks(count){
    for (let i = 0; i < count; i++) {
      const x = Math.random()*cv.width;
      const y = Math.random()*cv.height;
      const angle = Math.random()*Math.PI*2;
      cracks.push(makeBranch(x,y,angle, 80+Math.random()*120, 3));
    }
  }
  function makeBranch(x,y,angle,length,depth){
    const pts = [{x,y}];
    let cx2 = x, cy2 = y, a = angle;
    const steps = 10;
    for (let i = 0; i < steps; i++) {
      a += (Math.random()-0.5)*0.6;
      cx2 += Math.cos(a)*(length/steps);
      cy2 += Math.sin(a)*(length/steps);
      pts.push({x:cx2,y:cy2});
    }
    const branch = {pts, children:[]};
    if (depth > 0 && Math.random() < 0.7) {
      const mid = Math.floor(pts.length*0.4);
      const p = pts[mid];
      branch.children.push(makeBranch(p.x,p.y,a+Math.PI/2*(Math.random()<0.5?1:-1), length*0.5, depth-1));
    }
    return branch;
  }
  function drawBranch(b, alpha){
    cx.beginPath();
    cx.moveTo(b.pts[0].x, b.pts[0].y);
    for (let i = 1; i < b.pts.length; i++) cx.lineTo(b.pts[i].x, b.pts[i].y);
    cx.strokeStyle = `rgba(20,20,20,${alpha})`;
    cx.lineWidth = 0.8;
    cx.stroke();
    for (const c of b.children) drawBranch(c, alpha*0.6);
  }

  seedCracks(14);

  function render(){
    cx.clearRect(0,0,cv.width,cv.height);
    for (const c of cracks) drawBranch(c, 0.28);
  }
  render();
  addEventListener('resize',()=>setTimeout(()=>{cracks.length=0;seedCracks(14);render();},50));

  // 클릭 시 균열 추가
  addEventListener('click',(e)=>{
    for (let i = 0; i < 3; i++) {
      cracks.push(makeBranch(e.clientX, e.clientY, Math.random()*Math.PI*2, 60+Math.random()*100, 2));
    }
    render();
  });
})();

// ── 용 실루엣 ──
(function(){
  const cv = document.getElementById('dragon');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize(); addEventListener('resize', resize);
  const cx = cv.getContext('2d');

  function render(){
    cx.clearRect(0,0,cv.width,cv.height);
    const t = (Date.now()-startT)/DURATION;
    const alpha = 0.08 + Math.min(0.18, t*0.25);

    const W = cv.width, H = cv.height;
    // 용 모양: 구불구불한 S자 + 머리 + 날개
    const cx0 = W*0.5, cy0 = H*0.5;
    const scale = Math.min(W,H)*0.00048;

    cx.save();
    cx.translate(cx0, cy0);
    cx.scale(scale*600, scale*600);
    cx.strokeStyle = `rgba(30,30,30,${alpha})`;
    cx.fillStyle = `rgba(30,30,30,${alpha*0.6})`;
    cx.lineWidth = 0.04;

    // 몸통 (베지어)
    cx.beginPath();
    cx.moveTo(0.6, 0.4);
    cx.bezierCurveTo(0.3, 0.5, 0.1, 0.1, -0.2, 0);
    cx.bezierCurveTo(-0.45, -0.08, -0.55, 0.15, -0.75, 0.25);
    cx.stroke();

    // 머리 (원형 + 뿔)
    cx.beginPath();
    cx.arc(0.62, 0.38, 0.13, 0, Math.PI*2);
    cx.stroke();
    cx.beginPath();
    cx.moveTo(0.72, 0.28); cx.lineTo(0.82, 0.12);
    cx.moveTo(0.65, 0.22); cx.lineTo(0.68, 0.05);
    cx.stroke();
    // 눈
    cx.beginPath();
    cx.arc(0.66, 0.36, 0.025, 0, Math.PI*2);
    cx.fill();

    // 날개 (위로 펼친 삼각 꽃잎들)
    for (let i = 0; i < 4; i++) {
      const a = -Math.PI/2 - 0.35 + i*0.22;
      const r1 = 0.25, r2 = 0.55;
      cx.beginPath();
      cx.moveTo(0.15, 0.15);
      cx.quadraticCurveTo(
        0.15 + Math.cos(a)*r1*0.5, 0.15 + Math.sin(a)*r1*0.5,
        0.15 + Math.cos(a)*r2, 0.15 + Math.sin(a)*r2
      );
      cx.stroke();
    }

    // 꼬리 장식
    cx.beginPath();
    for (let i = 0; i < 8; i++) {
      const x = -0.55 - i*0.04;
      const y = 0.2 + Math.sin(i*1.2)*0.06;
      if (i===0) cx.moveTo(x,y); else cx.lineTo(x,y);
    }
    cx.stroke();

    cx.restore();
  }
  render();
  addEventListener('resize',()=>setTimeout(render,50));
  setInterval(render, 120);
})();

// ── 떠다니는 파티클: 광고/디자인 단어들 ──
(function(){
  const cv = document.getElementById('particles');
  function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
  resize(); addEventListener('resize', resize);
  const cx = cv.getContext('2d');
  cx.scale(devicePixelRatio, devicePixelRatio);

  const WORDS = ['AD','광고','디자인','기획','창조','TOTAL','DESIGNER','청룡','기획사','예술','간판','시트지','전주','BRAND','LOGO','TYPE','한글','KOREA','1990','레터링','서체'];
  const particles = [];
  for (let i = 0; i < 70; i++) {
    particles.push({
      x: Math.random()*innerWidth,
      y: Math.random()*innerHeight,
      vx: (Math.random()-0.5)*0.15,
      vy: (Math.random()-0.5)*0.1,
      word: WORDS[Math.floor(Math.random()*WORDS.length)],
      size: 8 + Math.random()*16,
      opacity: 0.06 + Math.random()*0.14,
      rot: (Math.random()-0.5)*0.3
    });
  }

  function loop(){
    cx.clearRect(0,0,innerWidth,innerHeight);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -40) p.x = innerWidth+40;
      if (p.x > innerWidth+40) p.x = -40;
      if (p.y < -40) p.y = innerHeight+40;
      if (p.y > innerHeight+40) p.y = -40;

      cx.save();
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      cx.font = `900 ${p.size}px 'Noto Sans KR'`;
      cx.fillStyle = `rgba(30,30,30,${p.opacity})`;
      cx.fillText(p.word, 0, 0);
      cx.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// ── 마우스 따라 글자 흔들림 ──
(function(){
  const chars = document.querySelectorAll('#hangul .ch');
  addEventListener('mousemove',(e)=>{
    const cx = innerWidth/2, cy = innerHeight/2;
    const dx = (e.clientX - cx)/cx;
    const dy = (e.clientY - cy)/cy;
    chars.forEach((c,i)=>{
      const sign = i%2===0 ? 1 : -1;
      c.style.transform = `translate(${dx*8*sign}px, ${dy*5}px) rotate(${dx*2*sign}deg)`;
    });
  });
})();

// ── 자막 변경 ──
const captions = [
  '사라진 간판은 시대의 그래픽 아카이브입니다',
  '1990년대 전주 — 예술을 창조하는 기업, 청룡',
  '한 세대의 디자인 언어가 유리문에 잠들어 있습니다',
  '레터링·시트지·용 로고 — 총체적 디자이너',
  '갈라진 표면 속에서 타이포그래피는 계속 살아있습니다',
  'TOTAL DESIGNER — 사라지는 것들의 기록',
];
const captionEl = document.getElementById('caption');
setInterval(()=>{
  const i = Math.floor(((Date.now()-startT)/DURATION) * captions.length) % captions.length;
  captionEl.textContent = captions[i];
}, 500);

// ── 프로그레스 ──
const pbar = document.getElementById('pbar');
function tick(){
  const t = Math.min(1, (Date.now()-startT)/DURATION);
  pbar.style.width = (t*100)+'%';
  if (t < 1) requestAnimationFrame(tick);
}
tick();

// ── 클릭 시 흔들림 ──
const hwrap = document.getElementById('hwrap');
addEventListener('click',()=>{
  hwrap.classList.remove('shake');
  void hwrap.offsetWidth;
  hwrap.classList.add('shake');
});
</script>

</body>
</html>
