<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hotspot Editor — 청룡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#eee;overflow:hidden}
.toolbar{position:fixed;top:0;left:0;right:0;background:#000;padding:10px 14px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #333;z-index:100;font-size:0.8rem;flex-wrap:wrap}
.toolbar button{background:#ffe28b;color:#000;border:none;padding:6px 12px;font-weight:700;cursor:pointer;font-size:0.75rem;letter-spacing:0.1em}
.toolbar button.sec{background:#333;color:#ffe28b}
.toolbar button:hover{opacity:0.85}
.toolbar .sel{padding:4px 10px;background:#222;border:1px solid #444}
.toolbar input{background:#1a1a1a;color:#eee;border:1px solid #333;padding:4px 6px;font-size:0.75rem;width:60px}

.stage{position:fixed;top:46px;left:0;right:320px;bottom:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;overflow:hidden}
.img-wrap{position:relative;max-width:100%;max-height:100%;aspect-ratio:4000/2662}
.img-wrap img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}

.hs{position:absolute;border:2px solid rgba(255,230,139,0.7);background:rgba(255,230,139,0.1);cursor:move}
.hs.active{border-color:#ffe28b;background:rgba(255,230,139,0.25);box-shadow:0 0 0 2px #000,0 0 0 4px #ffe28b}
.hs .num{position:absolute;top:-1px;left:-1px;background:rgba(255,230,139,0.95);color:#000;font-size:10px;font-weight:700;padding:1px 5px;letter-spacing:0.1em}
.hs .handle{position:absolute;width:10px;height:10px;background:#ffe28b;border:1px solid #000;z-index:2}
.hs .h-tl{top:-5px;left:-5px;cursor:nw-resize}
.hs .h-tr{top:-5px;right:-5px;cursor:ne-resize}
.hs .h-bl{bottom:-5px;left:-5px;cursor:sw-resize}
.hs .h-br{bottom:-5px;right:-5px;cursor:se-resize}

.panel{position:fixed;top:46px;right:0;bottom:0;width:320px;background:#1a1a1a;border-left:1px solid #333;padding:12px;overflow-y:auto;font-size:0.8rem}
.panel h3{font-size:0.8rem;letter-spacing:0.15em;color:#ffe28b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #333}
.panel .list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.panel .item{padding:6px 8px;background:#222;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent}
.panel .item:hover{background:#2a2a2a}
.panel .item.active{background:#333;border-left-color:#ffe28b}
.panel .item .n{font-weight:700;color:#ffe28b;font-size:0.7rem;width:22px}
.panel .coords{background:#0d0d0d;padding:8px;font-family:monospace;font-size:0.65rem;color:#aaa;line-height:1.6;margin-bottom:12px;border:1px solid #333;word-break:break-all}
.panel .hint{color:#888;font-size:0.7rem;line-height:1.6}
.panel label{display:block;color:#888;font-size:0.65rem;letter-spacing:0.1em;margin-bottom:3px;margin-top:8px}
.panel input.full{width:100%;background:#0d0d0d;color:#ffe28b;border:1px solid #333;padding:4px 6px;font-family:monospace;font-size:0.7rem}
.panel textarea{width:100%;background:#0d0d0d;color:#ffe28b;border:1px solid #333;padding:8px;font-family:monospace;font-size:0.65rem;line-height:1.5;resize:vertical;min-height:200px}
</style>
</head>
<body>

<div class="toolbar">
  <strong>HOTSPOT EDITOR</strong>
  <span class="sel" id="selinfo">—</span>
  <button onclick="addSpot()">+ 새 박스</button>
  <button class="sec" onclick="deleteSpot()">− 삭제</button>
  <button onclick="exportJSON()">📋 JSON 복사</button>
  <button class="sec" onclick="loadFromLS()">↻ 불러오기</button>
  <button class="sec" onclick="saveToLS()">💾 저장</button>
  <span style="color:#666;margin-left:auto">드래그: 이동 · 모서리: 리사이즈 · 클릭: 선택</span>
</div>

<div class="stage" id="stage">
  <div class="img-wrap" id="imgwrap">
    <img src="L1030722.jpg" id="bgimg" alt="">
  </div>
</div>

<div class="panel">
  <h3>HOTSPOTS</h3>
  <div class="list" id="list"></div>

  <h3>선택된 박스</h3>
  <label>KEY</label>
  <input class="full" id="in-key" placeholder="예: cheong">
  <label>TITLE</label>
  <input class="full" id="in-title" placeholder="예: 청룡">
  <label>LATIN</label>
  <input class="full" id="in-latin" placeholder="예: CHEONG-RYONG">
  <label>DESC</label>
  <input class="full" id="in-desc" placeholder="설명">

  <div style="margin-top:14px" class="coords" id="coords">박스를 선택하세요</div>

  <h3>EXPORT</h3>
  <textarea id="export" readonly></textarea>
  <p class="hint" style="margin-top:8px">
    ⌘+드래그 = 빠른 이동 · 화살표 = 1% 이동 · Shift+화살표 = 0.2% 이동 · Del = 삭제
  </p>
</div>

<script>
// 초기 데이터 (현재 상태 기준)
const INIT = [
  {key:'bell',    x:48.5,y:1,    w:6,    h:9,    title:'벨',           latin:'DOOR BELL',    desc:'오래된 초인종.'},
  {key:'ad',      x:24.5,y:17,   w:10,   h:13,   title:'광고기획',      latin:'AD PLANNING',  desc:'네모난 광고기획 배지.'},
  {key:'slogan',  x:18,  y:32,   w:28,   h:7,    title:'예술을 창조하는 기업',latin:'SLOGAN',desc:'작은 산세리프 한글 슬로건.'},
  {key:'cheong',  x:29,  y:43,   w:14,   h:52,   title:'청룡',         latin:'CHEONG-RYONG', desc:'거대한 세로 한글 레터링.'},
  {key:'dragon',  x:68,  y:19,   w:14,   h:20,   title:'청룡 로고',    latin:'DRAGON MARK',  desc:'날개를 펼친 용 실루엣.'},
  {key:'total',   x:56,  y:40,   w:29,   h:9,    title:'TOTAL DESIGNER',latin:'SERIF CAPS',  desc:'영문 세리프 대문자 레터링.'},
  {key:'ellipse', x:56,  y:52,   w:25,   h:13,   title:'기획사',       latin:'AGENCY',       desc:'타원형 프레임 안의 한글.'},
  {key:'design',  x:56,  y:72,   w:27,   h:15,   title:'광고·디자인',  latin:'AD DESIGN',    desc:'원형 마크와 함께 놓인 업무 카테고리.'},
  {key:'phone',   x:39,  y:58,   w:7.5,  h:8,    title:'010-6614-6449',latin:'HOTLINE',      desc:'연락처 스티커.'},
  {key:'lock',    x:48,  y:65,   w:6,    h:12,   title:'자물쇠',       latin:'PADLOCK',      desc:'굳게 잠긴 자물쇠.'},
  {key:'num6449', x:0,   y:28,   w:14,   h:50,   title:'6449',         latin:'6449',         desc:'반복되는 숫자 6449.'},
  {key:'korea',   x:88,  y:26,   w:10,   h:55,   title:'한국·전주·휴대폰',latin:'LOCATION',  desc:'우측 세로 한글 정보.'},
];

let spots = JSON.parse(JSON.stringify(INIT));
let selected = null;
const imgwrap = document.getElementById('imgwrap');
const listEl = document.getElementById('list');
const coordsEl = document.getElementById('coords');
const exportEl = document.getElementById('export');
const selinfo = document.getElementById('selinfo');

function render() {
  // 기존 hs 제거
  imgwrap.querySelectorAll('.hs').forEach(e=>e.remove());
  // 리스트
  listEl.innerHTML = '';
  spots.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'hs';
    if (i === selected) el.classList.add('active');
    el.style.left = s.x + '%';
    el.style.top = s.y + '%';
    el.style.width = s.w + '%';
    el.style.height = s.h + '%';
    el.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="handle h-tl" data-h="tl"></span>
      <span class="handle h-tr" data-h="tr"></span>
      <span class="handle h-bl" data-h="bl"></span>
      <span class="handle h-br" data-h="br"></span>`;
    el.dataset.i = i;
    imgwrap.appendChild(el);

    const li = document.createElement('div');
    li.className = 'item';
    if (i === selected) li.classList.add('active');
    li.innerHTML = `<span class="n">${String(i+1).padStart(2,'0')}</span><span>${s.title}</span>`;
    li.onclick = () => { selected = i; render(); syncForm(); };
    listEl.appendChild(li);
  });
  updateCoords();
  updateExport();
  updateSelInfo();
}

function updateSelInfo() {
  if (selected === null) { selinfo.textContent = '—'; return; }
  const s = spots[selected];
  selinfo.textContent = `[${String(selected+1).padStart(2,'0')}] ${s.title}`;
}

function updateCoords() {
  if (selected === null) { coordsEl.textContent = '박스를 선택하세요'; return; }
  const s = spots[selected];
  coordsEl.textContent = `x: ${s.x.toFixed(2)}%
y: ${s.y.toFixed(2)}%
w: ${s.w.toFixed(2)}%
h: ${s.h.toFixed(2)}%`;
}

function updateExport() {
  exportEl.value = JSON.stringify(spots, null, 2);
}

function syncForm() {
  if (selected === null) return;
  const s = spots[selected];
  document.getElementById('in-key').value = s.key;
  document.getElementById('in-title').value = s.title;
  document.getElementById('in-latin').value = s.latin;
  document.getElementById('in-desc').value = s.desc;
}

['in-key','in-title','in-latin','in-desc'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    if (selected === null) return;
    const field = id.replace('in-','');
    spots[selected][field] = e.target.value;
    updateExport();
    render();
  });
});

// ── 드래그·리사이즈 ──
let drag = null;
imgwrap.addEventListener('mousedown', (e) => {
  const hs = e.target.closest('.hs');
  if (!hs) return;
  e.preventDefault();
  const i = parseInt(hs.dataset.i);
  selected = i;
  const rect = imgwrap.getBoundingClientRect();
  const handle = e.target.dataset.h;
  drag = {i, handle, rect, startX:e.clientX, startY:e.clientY, orig:{...spots[i]}};
  render();
  syncForm();
});

addEventListener('mousemove', (e) => {
  if (!drag) return;
  const dx = (e.clientX - drag.startX) / drag.rect.width * 100;
  const dy = (e.clientY - drag.startY) / drag.rect.height * 100;
  const s = spots[drag.i];
  const o = drag.orig;
  if (!drag.handle) {
    // 이동
    s.x = clamp(o.x + dx, 0, 100 - o.w);
    s.y = clamp(o.y + dy, 0, 100 - o.h);
  } else {
    if (drag.handle.includes('l')) {
      const nx = clamp(o.x + dx, 0, o.x + o.w - 1);
      s.w = o.w - (nx - o.x);
      s.x = nx;
    }
    if (drag.handle.includes('r')) {
      s.w = clamp(o.w + dx, 1, 100 - o.x);
    }
    if (drag.handle.includes('t')) {
      const ny = clamp(o.y + dy, 0, o.y + o.h - 1);
      s.h = o.h - (ny - o.y);
      s.y = ny;
    }
    if (drag.handle.includes('b')) {
      s.h = clamp(o.h + dy, 1, 100 - o.y);
    }
  }
  render();
});

addEventListener('mouseup', () => drag = null);

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── 키보드 ──
addEventListener('keydown', (e) => {
  if (selected === null) return;
  if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
  const step = e.shiftKey ? 0.2 : 1;
  const s = spots[selected];
  if (e.key === 'ArrowLeft')  { s.x = clamp(s.x - step, 0, 100 - s.w); e.preventDefault(); }
  if (e.key === 'ArrowRight') { s.x = clamp(s.x + step, 0, 100 - s.w); e.preventDefault(); }
  if (e.key === 'ArrowUp')    { s.y = clamp(s.y - step, 0, 100 - s.h); e.preventDefault(); }
  if (e.key === 'ArrowDown')  { s.y = clamp(s.y + step, 0, 100 - s.h); e.preventDefault(); }
  if (e.key === 'Delete' || e.key === 'Backspace') { deleteSpot(); e.preventDefault(); }
  render();
});

function addSpot() {
  spots.push({key:'new'+spots.length, x:40, y:40, w:15, h:15, title:'새 영역', latin:'NEW', desc:''});
  selected = spots.length - 1;
  render(); syncForm();
}
function deleteSpot() {
  if (selected === null) return;
  spots.splice(selected, 1);
  selected = null;
  render();
}
function exportJSON() {
  navigator.clipboard.writeText(exportEl.value);
  alert('JSON을 클립보드에 복사했습니다.');
}
function saveToLS() {
  localStorage.setItem('hotspots_0424', JSON.stringify(spots));
  alert('저장됨');
}
function loadFromLS() {
  const raw = localStorage.getItem('hotspots_0424');
  if (raw) { spots = JSON.parse(raw); selected = null; render(); alert('불러옴'); }
  else alert('저장된 데이터 없음');
}

// 앱 시작 시 자동으로 localStorage에서 불러오기
const saved = localStorage.getItem('hotspots_0424');
if (saved) { try { spots = JSON.parse(saved); } catch(e){} }

render();
</script>
</body>
</html>
