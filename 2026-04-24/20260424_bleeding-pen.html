<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Bleeding Pen — 2025 수능 불량 사인펜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#ededea;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a}
body.started{cursor:none}
#stage{position:fixed;inset:0}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#paper{z-index:1}
#ink{z-index:2}
#smudge{z-index:3}
#overlay{position:fixed;inset:0;z-index:10;pointer-events:none}
.ui-top{position:absolute;top:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:0.2em;color:#888;font-weight:700;pointer-events:none}
.ui-top .home{pointer-events:auto;color:#888;text-decoration:none;letter-spacing:0.2em}
.ui-top .home:hover{color:#1a1a1a}
.ui-top .date{font-family:'Noto Serif KR',serif;font-weight:400;letter-spacing:0.12em;color:#666}
.crosshair{position:absolute;width:1px;height:1px;pointer-events:none;z-index:20;mix-blend-mode:multiply}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(20,20,20,0.35)}
.crosshair::before{left:-8px;top:0;width:16px;height:1px}
.crosshair::after{left:0;top:-8px;width:1px;height:16px}

/* 인트로 */
#intro{position:fixed;inset:0;z-index:30;background:#ededea;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 1.4s ease;cursor:pointer}
#intro.hide{opacity:0;pointer-events:none}
.crosshair{display:none}
.started .crosshair{display:block}
.intro-date{font-family:'Noto Serif KR',serif;font-size:11px;letter-spacing:0.3em;color:#888;margin-bottom:26px}
.intro-title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:clamp(1.6rem,3.6vw,2.6rem);line-height:1.5;text-align:center;max-width:720px;color:#1a1a1a}
.intro-sub{margin-top:40px;font-size:11px;letter-spacing:0.2em;color:#aaa;animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:0.8}}
</style>
</head>
<body>

<div id="intro">
  <div class="intro-date">2025. 11. 13. 대학수학능력시험</div>
  <div class="intro-title">당신의 3년이<br>이 종이 위에 기록됩니다.</div>
  <div class="intro-sub">CLICK TO BEGIN</div>
</div>

<div id="stage">
  <canvas id="paper"></canvas>
  <canvas id="ink"></canvas>
  <canvas id="smudge"></canvas>
</div>

<div id="overlay">
  <div class="ui-top">
    <a class="home" href="../index.html">← NEWSROOM</a>
    <div class="date">2025. 11. 13.&nbsp;&nbsp;08:40 · 제 1 교시</div>
  </div>
</div>

<div class="crosshair" id="crosshair"></div>

<script>
/* ===== 레이아웃 · OMR 카드 그리기 ===== */
const paper = document.getElementById('paper');
const inkCv = document.getElementById('ink');
const smudgeCv = document.getElementById('smudge');
const pctx = paper.getContext('2d');
const ictx = inkCv.getContext('2d', { willReadFrequently: true });
const sctx = smudgeCv.getContext('2d');

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
let omr = null; // {x,y,w,h, cells:[{x,y,r,num,opt}]}

function resize(){
  W = innerWidth; H = innerHeight;
  for (const cv of [paper, inkCv, smudgeCv]) {
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
  }
  pctx.setTransform(DPR,0,0,DPR,0,0);
  ictx.setTransform(DPR,0,0,DPR,0,0);
  sctx.setTransform(DPR,0,0,DPR,0,0);
  drawPaper();
}

function drawPaper(){
  const ctx = pctx;
  // 배경
  ctx.fillStyle = '#ededea';
  ctx.fillRect(0,0,W,H);

  // 종이 영역 (실제 OMR 비율 ≈ 1.4:1)
  const pad = Math.min(W,H) * 0.04;
  let pw = Math.min(W - pad*2, 1280);
  let ph = pw * 0.7;
  if (ph > H - pad*2) { ph = H - pad*2; pw = ph / 0.7; }
  const px = (W - pw)/2, py = (H - ph)/2;

  // 종이 그림자 + 흰색
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 24; ctx.shadowOffsetY = 3;
  ctx.fillStyle = '#fbfaf6';
  ctx.fillRect(px, py, pw, ph);
  ctx.restore();

  // 좌우 상단/하단 검은색 타이밍 마커 (실제 OMR 인식용 4각 사각형)
  ctx.fillStyle = '#1a1a1a';
  const mk = Math.min(pw,ph)*0.018;
  ctx.fillRect(px+mk*1.2, py+mk*1.2, mk*2.2, mk*1.3);
  ctx.fillRect(px+pw-mk*3.4, py+mk*1.2, mk*2.2, mk*1.3);
  ctx.fillRect(px+mk*1.2, py+ph-mk*2.5, mk*2.2, mk*1.3);
  ctx.fillRect(px+pw-mk*3.4, py+ph-mk*2.5, mk*2.2, mk*1.3);
  // 좌측 중간 타이밍 마커 4개
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(px+mk*1.2, py+ph*(0.16 + i*0.06), mk*1.6, mk*0.8);
  }
  ctx.fillRect(px+mk*1.2, py+ph*0.5, mk*1.4, mk*0.8);

  // 헤더 텍스트
  ctx.fillStyle = '#1a1a1a';
  ctx.textBaseline = 'top'; ctx.textAlign = 'left';
  ctx.font = `700 13px 'Noto Serif KR',serif`;
  ctx.fillText('대학수학능력시험 답안지', px + pw*0.08, py + ph*0.04);
  ctx.font = `400 9px 'Noto Sans KR',sans-serif`;
  ctx.fillStyle = '#333';
  ctx.fillText('※ 답안지 작성(표기)은 반드시 검은색 컴퓨터용 사인펜만을 사용하고, 연필 또는 샤프 등의 필기구를 절대 사용하지 마십시오.', px + pw*0.36, py + ph*0.045);

  // ① 교시 + 국어영역 (크게)
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `900 22px 'Noto Sans KR',sans-serif`;
  // ① 원형 숫자
  const jX = px + pw*0.08, jY = py + ph*0.105;
  ctx.beginPath(); ctx.arc(jX+12, jY+14, 13, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a1a'; ctx.fill();
  ctx.fillStyle = '#fbfaf6';
  ctx.font = `900 15px 'Noto Sans KR'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('1', jX+12, jY+15);
  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = `400 11px 'Noto Sans KR'`;
  ctx.fillText('교시', jX+30, jY+3);
  ctx.font = `900 22px 'Noto Sans KR'`;
  ctx.fillText('국  어  영  역', jX+55, jY-2);

  /* ===== 좌측 영역: 결시자확인/필적/성명/전화/시험고유번호/감독관 ===== */
  const lx = px + pw*0.06, ly = py + ph*0.19;
  const lw = pw*0.27;

  // ── 결시자 확인 박스 ──
  const rsY = ly;
  const rsH = ph*0.085;
  // 외부 타이틀 바 (박스 상단에 얹힘)
  const titleH = 16;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(lx, rsY - titleH, lw*0.44, titleH);
  ctx.fillStyle = '#fbfaf6';
  ctx.font = `700 10px 'Noto Sans KR'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('결시자 확인', lx + lw*0.22, rsY - titleH/2);
  // 우측 주석
  ctx.fillStyle = '#666';
  ctx.font = `400 8.5px 'Noto Sans KR'`;
  ctx.textAlign = 'left';
  ctx.fillText('(수험생은 표기하지 말 것)', lx + lw*0.46, rsY - titleH/2 + 0.5);
  // 박스 본체
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(lx, rsY, lw, rsH);
  // 본문 설명
  ctx.fillStyle = '#333';
  ctx.font = `400 8.5px 'Noto Sans KR'`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('검은색 컴퓨터용 사인펜을 사용하여', lx + 8, rsY + 8);
  ctx.fillText('수험번호란과 옆란을 표기', lx + 8, rsY + 22);
  // 결시자 표기 원
  ctx.beginPath(); ctx.arc(lx + lw - 22, rsY + rsH/2, 10, 0, Math.PI*2);
  ctx.strokeStyle = '#c92a3e'; ctx.lineWidth = 1.2; ctx.stroke();

  // ── 필적 확인란 ──
  const pfY = rsY + rsH + 22;
  const pfH = ph*0.09;
  // 상단 주석 (박스 위)
  ctx.fillStyle = '#333';
  ctx.font = `400 8px 'Noto Sans KR'`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText('※ 문제지 표지에 안내된 필적 확인 문구를 아래', lx, pfY - 10);
  ctx.fillText("'필적 확인란'에 정자로 반드시 기재하여야 합니다.", lx, pfY - 1);
  // 박스 본체
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(lx, pfY, lw, pfH);
  // 좌측 라벨 영역
  ctx.strokeRect(lx, pfY, lw*0.22, pfH);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `700 11px 'Noto Sans KR'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('필  적', lx + lw*0.11, pfY + pfH/2 - 8);
  ctx.fillText('확인란', lx + lw*0.11, pfY + pfH/2 + 8);

  // ── 성명 ──
  const smY = pfY + pfH + 16;
  const smH = ph*0.045;
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `700 11px 'Noto Sans KR'`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('성  명', lx + 4, smY + smH/2);
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.8;
  ctx.strokeRect(lx + lw*0.22, smY, lw*0.78, smH);

  // ── 전화번호 + 시험 고유번호 라벨 ──
  const phY = smY + smH + 12;
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `700 10px 'Noto Sans KR'`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('전 화 번 호 (010제외)', lx, phY);
  ctx.fillText('시험 고유번호', lx + lw*0.56, phY);

  // 월/일/백/십/일 소라벨
  ctx.font = `400 7px 'Noto Sans KR'`;
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  const rightStart0 = lx + lw*0.56;
  const rightW0 = lw*0.44;
  const rCellW0 = rightW0 / 5;
  ['월','일','백','십','일'].forEach((ch, i) => {
    ctx.fillText(ch, rightStart0 + (i+0.5)*rCellW0, phY + 11);
  });

  /* 수험번호 버블: 좌측 8칸(전화) + 우측 5칸(고유번호) */
  const bubY = phY + 24;
  const leftCols = 8;
  const dashCol = 3;
  const bubCellW = lw / leftCols;
  const bubR = Math.min(bubCellW*0.33, 5.5);
  const bubRows = 10;

  // 좌측 8칸: 상단 빈 박스 (대시 칸 제외)
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let c = 0; c < leftCols; c++) {
    if (c === dashCol) {
      ctx.fillStyle = '#1a1a1a';
      ctx.font = `700 14px 'Noto Sans KR'`;
      ctx.fillText('—', lx + (c+0.5)*bubCellW, bubY + 5);
      continue;
    }
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
    ctx.strokeRect(lx + c*bubCellW + 1.5, bubY, bubCellW - 3, 11);
  }
  // 0~9 버블
  const bubSpaceY = bubR*2 + 1.5;
  for (let r = 0; r < bubRows; r++) {
    const by = bubY + 15 + r * bubSpaceY + bubR;
    for (let c = 0; c < leftCols; c++) {
      if (c === dashCol) continue;
      const bx = lx + (c+0.5)*bubCellW;
      ctx.beginPath(); ctx.arc(bx, by, bubR, 0, Math.PI*2);
      ctx.strokeStyle = '#c92a3e'; ctx.lineWidth = 0.7; ctx.stroke();
      ctx.fillStyle = '#c92a3e';
      ctx.font = `400 ${bubR*1.05}px 'Noto Sans KR'`;
      ctx.fillText(String(r), bx, by);
    }
  }

  // 우측 5칸 상단 빈 박스
  const rCellW = rightW0 / 5;
  const rBubR = Math.min(rCellW*0.33, 5);
  for (let c = 0; c < 5; c++) {
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
    ctx.strokeRect(rightStart0 + c*rCellW + 1.5, bubY, rCellW - 3, 11);
  }
  // 0~9 버블
  for (let r = 0; r < bubRows; r++) {
    const by = bubY + 15 + r * (rBubR*2 + 1.5) + rBubR;
    for (let c = 0; c < 5; c++) {
      const bx = rightStart0 + (c+0.5)*rCellW;
      ctx.beginPath(); ctx.arc(bx, by, rBubR, 0, Math.PI*2);
      ctx.strokeStyle = '#c92a3e'; ctx.lineWidth = 0.7; ctx.stroke();
      ctx.fillStyle = '#c92a3e';
      ctx.font = `400 ${rBubR*1.05}px 'Noto Sans KR'`;
      ctx.fillText(String(r), bx, by);
    }
  }

  // ── 감독관 확인 박스 ──
  const skH = ph*0.1;
  const skY = py + ph - skH - ph*0.02;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(lx, skY, lw, skH);
  // 좌측 라벨 컬럼
  ctx.strokeRect(lx, skY, lw*0.28, skH);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `700 11px 'Noto Sans KR'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('감독관', lx + lw*0.14, skY + skH*0.25);
  ctx.fillText('확  인', lx + lw*0.14, skY + skH*0.45);
  ctx.font = `400 7px 'Noto Sans KR'`;
  ctx.fillStyle = '#666';
  ctx.fillText('(수험생은 표기', lx + lw*0.14, skY + skH*0.7);
  ctx.fillText('하지 말 것)', lx + lw*0.14, skY + skH*0.85);
  // 중앙 서명 박스
  const sigX = lx + lw*0.3, sigY = skY + skH*0.12;
  const sigW = lw*0.26, sigH = skH*0.76;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.6;
  ctx.strokeRect(sigX, sigY, sigW, sigH);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `400 9px 'Noto Sans KR'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('서  명', sigX + sigW/2, sigY + sigH*0.25);
  ctx.fillText('또는', sigX + sigW/2, sigY + sigH*0.55);
  ctx.fillText('날  인', sigX + sigW/2, sigY + sigH*0.85);
  // 우측 안내문
  ctx.font = `400 8px 'Noto Sans KR'`;
  ctx.fillStyle = '#333';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('본인 여부, 수험번호', lx + lw*0.6, skY + 8);
  ctx.fillText('및 문형의 표기가', lx + lw*0.6, skY + 20);
  ctx.fillText('정확한지 확인,', lx + lw*0.6, skY + 32);
  ctx.fillText('옆란에 서명 또는', lx + lw*0.6, skY + 44);
  ctx.fillText('날인', lx + lw*0.6, skY + 56);

  /* ===== 3개 답안 열: 공통(1~20), 공통(21~34), 선택(35~45) ===== */
  const cells = [];
  const answerStartX = px + pw*0.37;
  const answerW = pw*0.57;
  const answerY = py + ph*0.15;
  const answerH = ph*0.8;

  // 각 열의 폭 비율
  const colWidths = [0.34, 0.34, 0.32]; // 20, 14, 11 문항
  const colStartsQ = [1, 21, 35];
  const colEndsQ = [20, 34, 45];
  const colLabels = [
    {top:'공통 과목', side:'공 통 과 목'},
    {top:'공통 과목', side:'공 통 과 목'},
    {top:'선택 과목', side:'선 택 과 목'},
  ];

  let xAcc = answerStartX;
  for (let ci = 0; ci < 3; ci++) {
    const colW = answerW * colWidths[ci];
    const start = colStartsQ[ci], end = colEndsQ[ci];
    const rows = end - start + 1;

    // 세로 한글 라벨 (좌측)
    ctx.fillStyle = '#1a1a1a';
    ctx.font = `700 9px 'Noto Sans KR'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const sideChars = colLabels[ci].side.split(' ');
    const labelX = xAcc + 7;
    const labelY0 = answerY + 50;
    sideChars.forEach((ch, i) => {
      ctx.fillText(ch, labelX, labelY0 + i*14 + rows*3);
    });

    // 헤더 박스
    const headX = xAcc + 16;
    const headW = colW - 18;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(headX, answerY, headW, 20);
    ctx.fillStyle = '#fbfaf6';
    ctx.font = `700 11px 'Noto Sans KR'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(colLabels[ci].top, headX + headW/2, answerY + 10);

    // 문번/답란 헤더
    ctx.fillStyle = '#fbfaf6';
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.8;
    ctx.fillRect(headX, answerY+20, headW*0.22, 18);
    ctx.fillRect(headX + headW*0.22, answerY+20, headW*0.78, 18);
    ctx.strokeRect(headX, answerY+20, headW*0.22, 18);
    ctx.strokeRect(headX + headW*0.22, answerY+20, headW*0.78, 18);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = `700 10px 'Noto Sans KR'`;
    ctx.fillText('문번', headX + headW*0.11, answerY+29);
    ctx.fillText('답    란', headX + headW*0.61, answerY+29);

    // 각 문항 행
    const gridTop = answerY + 38;
    const gridH = answerH - 38;
    const rowH = gridH / rows;
    const bubbleR = Math.min(rowH*0.32, (headW*0.78)/14);

    for (let r = 0; r < rows; r++) {
      const num = start + r;
      const cy = gridTop + (r+0.5)*rowH;
      // 5 단위 행 강조
      const strong = num % 5 === 0;
      // 구분선
      ctx.strokeStyle = 'rgba(20,20,20,0.18)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(headX, gridTop + (r+1)*rowH);
      ctx.lineTo(headX + headW, gridTop + (r+1)*rowH);
      ctx.stroke();
      // 좌우 테두리
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(headX, gridTop); ctx.lineTo(headX, gridTop + rows*rowH);
      ctx.moveTo(headX + headW*0.22, gridTop); ctx.lineTo(headX + headW*0.22, gridTop + rows*rowH);
      ctx.moveTo(headX + headW, gridTop); ctx.lineTo(headX + headW, gridTop + rows*rowH);
      ctx.stroke();
      // 하단 테두리
      ctx.beginPath();
      ctx.moveTo(headX, gridTop + rows*rowH);
      ctx.lineTo(headX + headW, gridTop + rows*rowH);
      ctx.stroke();

      // 문번
      ctx.fillStyle = '#1a1a1a';
      ctx.font = `${strong?'700':'400'} 11px 'Noto Sans KR'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(num), headX + headW*0.11, cy);

      // 5지선다 버블
      const bubStart = headX + headW*0.22 + headW*0.06;
      const bubSpace = headW*0.72 / 5;
      for (let o = 0; o < 5; o++) {
        const bx = bubStart + bubSpace*(o+0.5);
        ctx.beginPath();
        ctx.arc(bx, cy, bubbleR, 0, Math.PI*2);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.9;
        ctx.stroke();
        ctx.font = `400 ${Math.max(8, bubbleR*0.95)}px 'Noto Sans KR'`;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillText(['①','②','③','④','⑤'][o], bx, cy+0.5);
        cells.push({ x:bx, y:cy, r:bubbleR, num, opt:o });
      }
    }

    xAcc += colW;
  }

  omr = { x:px, y:py, w:pw, h:ph, cells };
}

resize();
addEventListener('resize', resize);

/* ===== 잉크 시뮬레이션 ===== */
/* 잉크 방울: 성장/번짐/드립 */
const drops = [];      // 퍼지는 잉크 방울 (마킹, 오염)
const droplets = [];   // 공중 드립(펜촉에서 떨어지는 방울)
const smudges = [];    // 손 얼룩
let mouseX = W/2, mouseY = H/2, mdown = false;
let lastMoveT = 0;

function addInkDrop(x, y, opts={}){
  const base = {
    x, y,
    r: opts.r0 || (2 + Math.random()*2),
    target: opts.target || (8 + Math.random()*6),
    growRate: opts.growRate || (0.08 + Math.random()*0.12),
    bleedRate: opts.bleedRate || (0.002 + Math.random()*0.004),
    bleedTarget: opts.bleedTarget || (opts.target ? opts.target*1.6 : 0),
    life: 0,
    maxLife: opts.maxLife || 9999,
    // 번짐 불규칙성을 위한 로컬 perlin 시드
    seed: Math.random()*1000,
    spikes: opts.spikes !== undefined ? opts.spikes : 16,
    alpha: opts.alpha || 0.92,
    jitter: opts.jitter || 0.15,
    burst: opts.burst || false,
  };
  drops.push(base);
  return base;
}

/* 섬유를 따라 불규칙하게 퍼지는 얼룩을 그림 */
function drawBlob(d){
  const ctx = ictx;
  const pts = d.spikes;
  ctx.beginPath();
  for (let i = 0; i <= pts; i++) {
    const a = (i/pts) * Math.PI*2;
    // 방향별 불규칙 반경 (의사 펄린)
    const n = Math.sin(a*3 + d.seed) * 0.5
            + Math.sin(a*7 + d.seed*1.3) * 0.3
            + Math.sin(a*13 + d.seed*2.1) * 0.2;
    const rr = d.r * (1 + n * d.jitter);
    const x = d.x + Math.cos(a)*rr;
    const y = d.y + Math.sin(a)*rr;
    if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  // 잉크 그라디언트: 안쪽 진한 검정, 가장자리 푸른 번짐
  const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r*1.15);
  g.addColorStop(0, `rgba(8,12,20,${Math.min(0.98, d.alpha)})`);
  g.addColorStop(0.6, `rgba(18,28,55,${d.alpha*0.92})`);
  g.addColorStop(0.92, `rgba(30,55,95,${d.alpha*0.45})`);
  g.addColorStop(1, 'rgba(60,90,140,0)');
  ctx.fillStyle = g;
  ctx.fill();
}

/* OMR 바운딩 박스 체크 */
function inPaper(x,y){
  if (!omr) return false;
  return x > omr.x && x < omr.x + omr.w && y > omr.y && y < omr.y + omr.h;
}

/* 셀 감지 */
function cellAt(x,y){
  if (!omr) return null;
  for (const c of omr.cells) {
    const dx = x-c.x, dy = y-c.y;
    if (dx*dx + dy*dy < c.r*c.r*2.2) return c;
  }
  return null;
}

/* ===== 인터랙션 ===== */
const crosshair = document.getElementById('crosshair');

/* 결함 난이도: 마킹 수에 따라 0→1로 상승.
   0~2회: 0 (완전 정상), 3~5회: 0.1~0.3, 6~9회: 0.4~0.7, 10회~: 1 */
function defectLevel(){
  if (markCount < 3) return 0;
  if (markCount < 6) return (markCount - 2) * 0.1;     // 0.1, 0.2, 0.3
  if (markCount < 10) return 0.3 + (markCount - 5) * 0.1; // 0.4, 0.5, 0.6, 0.7
  return 1;
}

function onMove(e){
  mouseX = e.clientX; mouseY = e.clientY;
  crosshair.style.transform = `translate(${mouseX}px,${mouseY}px)`;

  const now = performance.now();
  const dt = now - lastMoveT;
  lastMoveT = now;

  if (!started) return;
  const L = defectLevel();
  if (L === 0) return; // 초반엔 펜이 멀쩡함

  // 이동 중 펜촉에서 잉크 뚝뚝 — L에 비례
  if (inPaper(mouseX, mouseY) && Math.random() < 0.08 * L) {
    droplets.push({
      x: mouseX + (Math.random()-0.5)*6,
      y: mouseY + (Math.random()-0.5)*6,
      vy: 0.3 + Math.random()*0.9,
      vx: (Math.random()-0.5)*0.3,
      life: 0,
      maxLife: 35 + Math.random()*30,
      r: 1.2 + Math.random()*1.6,
    });
  }

  // 이동 중 손자국 — 결함이 심해진 뒤에만
  if (L > 0.5 && inPaper(mouseX, mouseY) && Math.random() < 0.015 * L) {
    smudges.push({
      x: mouseX + (Math.random()-0.5)*40,
      y: mouseY + (Math.random()-0.5)*40,
      r: 18 + Math.random()*26,
      alpha: 0.03 + Math.random()*0.05,
      angle: Math.random()*Math.PI,
    });
    drawSmudges();
  }
}

function onDown(e){
  if (!started) return;
  mdown = true;
  handleMark(e.clientX, e.clientY);
}
function onUp(){ mdown = false; }

function handleMark(x, y){
  if (!inPaper(x,y)) return;

  markCount++;
  const L = defectLevel();

  // 셀 마킹 여부 판단
  const cell = cellAt(x, y);

  // 1) 정상 마킹 (작고 진한 원) — 항상 발생
  if (cell) {
    addInkDrop(cell.x + (Math.random()-0.5)*1.2, cell.y + (Math.random()-0.5)*1.2, {
      r0: cell.r*0.3, target: cell.r*0.95, growRate: 0.15,
      // 결함 레벨에 따라 번짐 범위/속도 증가
      bleedTarget: cell.r * (1 + L*1.2),
      bleedRate: 0.0008 + L*0.003,
      spikes: 20, jitter: 0.05 + L*0.15, alpha: 0.95,
    });
  } else {
    // 빈 공간 클릭
    addInkDrop(x, y, {
      r0: 1.5, target: 4 + Math.random()*2, growRate: 0.1,
      bleedTarget: 6 + L*10, bleedRate: 0.001 + L*0.002,
    });
  }

  // 2) 잉크 폭발 (Burst) — L에 비례
  if (Math.random() < L * 0.35) {
    const bx = x + (Math.random()-0.5)*6;
    const by = y + (Math.random()-0.5)*6;
    addInkDrop(bx, by, {
      r0: 4, target: 12 + L * (12 + Math.random()*14),
      growRate: 0.25,
      bleedTarget: 30 + L * 30, bleedRate: 0.003,
      spikes: 26, jitter: 0.35, alpha: 0.9, burst:true,
    });
    // 튄 방울들
    const sprayN = Math.floor(3 + L * 10);
    for (let i = 0; i < sprayN; i++) {
      const a = Math.random()*Math.PI*2;
      const dist = 10 + Math.random()*40;
      addInkDrop(bx + Math.cos(a)*dist, by + Math.sin(a)*dist, {
        r0: 0.8, target: 1.5 + Math.random()*2.5, growRate: 0.3,
        bleedTarget: 4, bleedRate: 0.003,
        spikes: 10, jitter: 0.4, alpha: 0.8,
      });
    }
  }

  // 3) 옆 칸으로 스며듦 — L에 비례
  if (cell && Math.random() < L * 0.45) {
    const neighbor = omr.cells.find(c =>
      c !== cell && c.num === cell.num &&
      Math.abs(c.opt - cell.opt) === 1
    );
    if (neighbor) {
      setTimeout(() => {
        addInkDrop(neighbor.x + (Math.random()-0.5)*3, neighbor.y + (Math.random()-0.5)*3, {
          r0: 0.5, target: neighbor.r*0.6, growRate: 0.04,
          bleedTarget: neighbor.r*1.1, bleedRate: 0.0015,
          spikes: 14, jitter: 0.3, alpha: 0.6,
        });
      }, 3000 + Math.random()*4000);
    }
  }
}

function drawSmudges(){
  for (const s of smudges.slice(-1)) {
    sctx.save();
    sctx.translate(s.x, s.y);
    sctx.rotate(s.angle);
    // 긴 타원형 손자국
    for (let i = 0; i < 18; i++) {
      const r = s.r * (0.2 + Math.random()*0.8);
      const dx = (Math.random()-0.5) * s.r * 1.4;
      const dy = (Math.random()-0.5) * s.r * 0.7;
      sctx.beginPath();
      sctx.arc(dx, dy, r, 0, Math.PI*2);
      const g = sctx.createRadialGradient(dx, dy, 0, dx, dy, r);
      g.addColorStop(0, `rgba(60,50,45,${s.alpha})`);
      g.addColorStop(1, 'rgba(60,50,45,0)');
      sctx.fillStyle = g;
      sctx.fill();
    }
    // 지문 라인
    sctx.strokeStyle = `rgba(40,30,25,${s.alpha*2})`;
    sctx.lineWidth = 0.6;
    for (let i = -4; i <= 4; i++) {
      sctx.beginPath();
      for (let t = -1; t <= 1; t += 0.08) {
        const x = t * s.r * 0.9;
        const y = i * 1.8 + Math.sin(t*3 + i) * 1.4;
        if (t === -1) sctx.moveTo(x,y); else sctx.lineTo(x,y);
      }
      sctx.stroke();
    }
    sctx.restore();
  }
}

/* ===== 메인 루프 ===== */
let running = false, started = false, markCount = 0;

function tick(){
  if (!running) return;

  // 잉크 드롭 성장 & 번짐
  // 부드러운 번짐을 위해 매 프레임 다시 그림 (drop 수는 제한)
  ictx.clearRect(0,0,W,H);

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    // 빠른 성장 (마킹 순간)
    if (d.r < d.target) {
      d.r += (d.target - d.r) * d.growRate;
    } else if (d.bleedTarget && d.r < d.bleedTarget) {
      // 느린 번짐
      d.r += d.bleedRate * (d.bleedTarget - d.r);
      d.jitter = Math.min(d.jitter + 0.0004, 0.45);
      d.alpha = Math.max(0.38, d.alpha - 0.0005);
    }
    d.life++;
    drawBlob(d);
    if (drops.length > 450) drops.shift(); // 성능 가드
  }

  // 공중 드립
  for (let i = droplets.length - 1; i >= 0; i--) {
    const dp = droplets[i];
    dp.x += dp.vx;
    dp.y += dp.vy;
    dp.vy += 0.05;
    dp.life++;
    if (dp.life > dp.maxLife || dp.y > H + 20) {
      // 떨어진 자리에 잉크 방울로 고정
      if (inPaper(dp.x, dp.y)) {
        addInkDrop(dp.x, dp.y, {
          r0: dp.r, target: dp.r*2.2, growRate: 0.15,
          bleedTarget: dp.r*3, bleedRate: 0.002,
          jitter: 0.25, alpha: 0.85,
        });
      }
      droplets.splice(i,1);
      continue;
    }
    // 공중 방울 그리기
    ictx.beginPath();
    ictx.ellipse(dp.x, dp.y, dp.r*0.6, dp.r, 0, 0, Math.PI*2);
    ictx.fillStyle = `rgba(10,15,30,0.85)`;
    ictx.fill();
  }

  requestAnimationFrame(tick);
}

/* ===== 인트로 / 시작 ===== */
const intro = document.getElementById('intro');
intro.addEventListener('click', () => {
  intro.classList.add('hide');
  document.body.classList.add('started');
  started = true; running = true;
  tick();
  setTimeout(() => intro.style.display = 'none', 1400);
});

addEventListener('mousemove', onMove);
addEventListener('mousedown', onDown);
addEventListener('mouseup', onUp);
addEventListener('touchstart', e => { const t = e.touches[0]; onMove(t); onDown(t); }, {passive:true});
addEventListener('touchmove', e => { onMove(e.touches[0]); }, {passive:true});
addEventListener('touchend', onUp, {passive:true});

/* ===== 지속적 번짐 업데이트 타이머 (여분 안전망) ===== */
setInterval(() => {
  // 일부 드롭의 bleedTarget을 조금씩 늘려 '계속 번지는' 느낌 유지
  for (const d of drops) {
    if (d.life > 200 && d.bleedTarget && d.r < d.bleedTarget * 1.05) {
      d.bleedTarget *= 1.002;
    }
  }
}, 500);
</script>
