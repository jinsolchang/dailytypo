<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>"자다 깼더니 바다 한가운데"…대부도 찾은 여성 날벼락</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020406;overflow:hidden;height:100vh;font-family:'Noto Serif KR',serif;user-select:none;cursor:none}
canvas{position:fixed;inset:0}
.overlay{position:fixed;z-index:10;pointer-events:none;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10vw}
#capLine{
  font-size:clamp(0.85rem,2.2vw,1.15rem);font-weight:400;
  color:rgba(170,200,215,0.55);letter-spacing:0.05em;line-height:1.8;text-align:center;
  min-height:1.5em;
}
#cursor{display:inline;color:rgba(170,200,215,0.5);animation:blink 1s step-end infinite}
#hint{
  font-size:clamp(0.5rem,1.1vw,0.65rem);color:rgba(120,160,180,0);
  margin-top:14px;letter-spacing:0.1em;transition:color 2s;
}
#hint.show{color:rgba(120,160,180,0.3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div><span id="capLine"></span><span id="cursor" style="display:none">_</span></div>
  <div id="hint">사람을 찾아보세요</div>
</div>

<script src="https://unpkg.com/type-hangul"></script>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();
addEventListener('resize',resize);

// ═══════════════════════════════════════
// 오디오
// ═══════════════════════════════════════
let AC=null;
function ensureAudio(){
  if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  return AC;
}

// 배경음
const bgm=new Audio('bgm.mp3');
bgm.loop=true;bgm.volume=0.35;
let bgmStarted=false;
function startBGM(){
  if(!bgmStarted){bgmStarted=true;ensureAudio();bgm.play().catch(()=>{})}
}
addEventListener('mousemove',startBGM,{once:true});
addEventListener('click',startBGM,{once:true});

function playType(){
  if(!AC)return;const t=AC.currentTime;
  const len=Math.floor(AC.sampleRate*0.03);
  const buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(len*0.05));
  const src=AC.createBufferSource();src.buffer=buf;
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;
  const g=AC.createGain();g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
  src.connect(hp).connect(g).connect(AC.destination);src.start(t);
  const o=AC.createOscillator();o.type='square';o.frequency.value=3800+Math.random()*1200;
  const g2=AC.createGain();g2.gain.setValueAtTime(0.05,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.01);
  o.connect(g2).connect(AC.destination);o.start(t);o.stop(t+0.015);
}

function playReturn(){
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(350,t);o.frequency.exponentialRampToValueAtTime(120,t+0.12);
  const g=AC.createGain();g.gain.setValueAtTime(0.035,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g).connect(AC.destination);o.start(t);o.stop(t+0.13);
}

// 파도 SFX — 여러 레이어 합성
function playWaveSFX(){
  if(!AC)return;const t=AC.currentTime;
  const sr=AC.sampleRate;
  const dur=1.8;
  const len=Math.floor(sr*dur);
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);

  // 파도 엔벨로프: 밀려왔다 빠지는 느낌
  for(let i=0;i<len;i++){
    const p=i/len;
    // 엔벨로프: 빠르게 올라가서 천천히 빠짐
    const env=p<0.15?p/0.15:Math.exp(-(p-0.15)*3);
    // 브라운 노이즈 (이전 샘플에 랜덤 추가)
    const white=Math.random()*2-1;
    d[i]=(i>0?d[i-1]*0.98:0)+white*0.02;
    d[i]*=env;
  }

  // 노멀라이즈
  let mx=0;for(let i=0;i<len;i++)mx=Math.max(mx,Math.abs(d[i]));
  if(mx>0)for(let i=0;i<len;i++)d[i]/=mx;

  const src=AC.createBufferSource();src.buffer=buf;

  // 로우패스 — 부드러운 파도
  const lp=AC.createBiquadFilter();lp.type='lowpass';
  lp.frequency.setValueAtTime(600,t);
  lp.frequency.linearRampToValueAtTime(150,t+dur);
  lp.Q.value=0.7;

  // 하이쉘프로 쉬익 소리 추가
  const hs=AC.createBiquadFilter();hs.type='highshelf';
  hs.frequency.value=2000;hs.gain.value=-10;

  const g=AC.createGain();
  g.gain.setValueAtTime(0.3,t);
  g.gain.linearRampToValueAtTime(0.08,t+dur*0.5);
  g.gain.linearRampToValueAtTime(0,t+dur);

  src.connect(lp).connect(hs).connect(g).connect(AC.destination);
  src.start(t);

  // 추가: 쉬익 하는 거품 레이어
  const fLen=Math.floor(sr*1.0);
  const fBuf=AC.createBuffer(1,fLen,sr);
  const fd=fBuf.getChannelData(0);
  for(let i=0;i<fLen;i++){
    const p=i/fLen;
    fd[i]=(Math.random()*2-1)*Math.max(0,1-p*1.5)*0.5;
  }
  const fSrc=AC.createBufferSource();fSrc.buffer=fBuf;
  const fHp=AC.createBiquadFilter();fHp.type='highpass';fHp.frequency.value=3000;
  const fG=AC.createGain();fG.gain.setValueAtTime(0.06,t+0.1);fG.gain.exponentialRampToValueAtTime(0.001,t+1.0);
  fSrc.connect(fHp).connect(fG).connect(AC.destination);
  fSrc.start(t+0.1);
}

// ═══════════════════════════════════════
// ~~ 물결
// ═══════════════════════════════════════
const waves=[];
function spawnWaves(){
  waves.length=0;
  for(let i=0;i<100;i++){
    waves.push({x:Math.random()*W*1.5-W*0.25,y:Math.random()*H,
      speed:0.15+Math.random()*0.4,phase:Math.random()*Math.PI*2,
      amp:1+Math.random()*3,freq:0.2+Math.random()*0.4,
      size:10+Math.random()*5,weight:Math.random()>0.6?400:200,
      alpha:0.02+Math.random()*0.05,
      pattern:['~','~~','~~~','\u301C','\u3030'][Math.floor(Math.random()*5)]});
  }
}
spawnWaves();
addEventListener('resize',()=>{resize();spawnWaves();placeObjects()});

// ═══════════════════════════════════════
// 갯바위
// ═══════════════════════════════════════
const MARGIN=60,rocks=[];
function makeRockShape(seed){
  const pts=[],n=6+Math.floor(seed*4);
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n,r=0.5+((Math.sin(seed*100+i*3.7)*0.5+0.5)*0.5);
    pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});
  }
  return pts;
}
function randPos(){return{x:MARGIN+Math.random()*(W-MARGIN*2),y:MARGIN+Math.random()*(H-MARGIN*2)}}
function placeObjects(){
  rocks.length=0;
  for(let i=0;i<20;i++){
    const p=randPos();
    rocks.push({x:p.x,y:p.y,size:10+Math.random()*40,rot:Math.random()*Math.PI*2,
      shape:makeRockShape(Math.random()),shade:0.06+Math.random()*0.08});
  }
  relocatePerson();
}
function drawRock(r,alpha){
  cx.save();cx.translate(r.x,r.y);cx.rotate(r.rot);cx.scale(r.size,r.size);
  cx.beginPath();const pts=r.shape;cx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)cx.quadraticCurveTo(pts[i-1].x+0.08,pts[i-1].y-0.04,pts[i].x,pts[i].y);
  cx.closePath();const b=r.shade;
  cx.fillStyle=`rgba(${40+b*80},${38+b*60},${35+b*50},${Math.min(0.85,alpha)})`;cx.fill();
  cx.strokeStyle=`rgba(90,85,75,${Math.min(0.4,alpha*0.6)})`;cx.lineWidth=0.06;cx.stroke();
  cx.restore();
}

// ═══════════════════════════════════════
// 사람
// ═══════════════════════════════════════
let person={x:0,y:0,alpha:0,state:'hidden',stateStart:0};
let spotTimer=0;
const SPOT_MS=1000;

function relocatePerson(){
  const rock=rocks[Math.floor(Math.random()*rocks.length)];
  person.x=rock.x;person.y=rock.y-rock.size*0.3;
  person.alpha=0;person.state='fadein';person.stateStart=Date.now();spotTimer=0;
}
placeObjects();

function drawCrouch(a){
  cx.save();cx.translate(person.x,person.y);cx.scale(0.7,0.7);cx.globalAlpha=a;
  cx.fillStyle='#888';
  cx.beginPath();cx.ellipse(0,0,7,10,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,-11,5,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#888';cx.lineWidth=3;cx.lineCap='round';
  cx.beginPath();cx.arc(0,0,9,0.3,Math.PI-0.3);cx.stroke();
  cx.globalAlpha=1;cx.restore();
}
function drawWave(a,t){
  cx.save();cx.translate(person.x,person.y);cx.scale(0.7,0.7);cx.globalAlpha=a;
  cx.fillStyle='#999';
  cx.beginPath();cx.ellipse(0,5,6,14,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,-12,5.5,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#999';cx.lineWidth=3.5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-3,18);cx.lineTo(-4,30);cx.stroke();
  cx.beginPath();cx.moveTo(3,18);cx.lineTo(4,30);cx.stroke();
  cx.lineWidth=3;cx.beginPath();cx.moveTo(-6,0);cx.lineTo(-10,15);cx.stroke();
  const w=Math.sin(t*8)*0.6;
  cx.beginPath();cx.moveTo(6,0);cx.lineTo(6+Math.cos(-1.2+w)*16,Math.sin(-1.2+w)*16);cx.stroke();
  cx.fillStyle='#999';cx.beginPath();cx.arc(6+Math.cos(-1.2+w)*17,Math.sin(-1.2+w)*17,2.5,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;cx.restore();
}

// ═══════════════════════════════════════
// 손전등
// ═══════════════════════════════════════
let mx=-9999,my=-9999,flashOn=0,flashAlpha=1;
let smx=-9999,smy=-9999;
let prevMx=0,prevMy=0,shakeEnergy=0;
addEventListener('mousemove',e=>{
  const dx=e.clientX-mx,dy=e.clientY-my;
  const speed=Math.sqrt(dx*dx+dy*dy);
  shakeEnergy=Math.min(1,shakeEnergy+speed*0.008);
  mx=e.clientX;my=e.clientY;flashOn=1;ensureAudio();
});
addEventListener('mouseleave',()=>{flashOn=0});
let FLASH_R=160,flashForceOff=false,flashBoost=0;

// ═══════════════════════════════════════
// 자막
// ═══════════════════════════════════════
const CAPS=[
  '대부도 방아머리해변 인근 갯바위에',
  '사람이 고립됐다는 신고가 접수됐다',
  '혼자 갯바위에서 바다를 보다가 잠이 들었고',
  '밀물이 몰려들면서 고립된 것으로 전해졌다',
  '현장에 출동한 해경이 무사히 구조했다',
  '',
  '"자다 깼더니 바다 한가운데"',
];
let capIdx=0,typing=false,done=false;
const capEl=document.getElementById('capLine');
const cursorEl=document.getElementById('cursor');
const hintEl=document.getElementById('hint');

capEl.addEventListener('th.beforeType',()=>{ensureAudio();playType()});
// 백업: DOM 변경 감지로도 소리 재생 (th.beforeType이 누락될 때)
let lastCapLen=0;
const capObserver=new MutationObserver(()=>{
  const curLen=capEl.textContent.length;
  if(curLen>lastCapLen&&typing){ensureAudio();playType()}
  lastCapLen=curLen;
});
capObserver.observe(capEl,{childList:true,characterData:true,subtree:true});

function showWaiting(){
  cursorEl.style.display='inline';
  // 힌트는 3초 후에 표시
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>hintEl.classList.add('show'),3000);
}
function hideWaiting(){
  cursorEl.style.display='none';
  hintEl.classList.remove('show');
  clearTimeout(hintTimer);
}
let hintTimer=null;

function typeLine(){
  if(done||capIdx>=CAPS.length){done=true;hideWaiting();return}
  hideWaiting();
  const line=CAPS[capIdx];
  if(!line){capEl.textContent='';capIdx++;
    setTimeout(()=>{if(!done)typeLine()},500);return}
  typing=true;capEl.textContent='';lastCapLen=0;
  TypeHangul.type('#capLine',{text:line,intervalType:70,humanize:0.4});
  capEl.addEventListener('th.endType',function onEnd(){
    capEl.removeEventListener('th.endType',onEnd);
    typing=false;capIdx++;playReturn();
    // 즉시 커서 깜박
    cursorEl.style.display='inline';
    // 마지막 줄이면 커서 깜박으로 여운
    if(capIdx>=CAPS.length){
      done=true;
      cursorEl.style.display='inline';
    }else{
      // 1초 후 사이클 진행
      setTimeout(()=>triggerCycle(),1000);
    }
  });
}

function triggerCycle(){
  // 깜빡깜빡하다가 꺼짐 (배터리 나간 느낌)
  let flickers=[
    {t:0,on:false},{t:120,on:true},{t:200,on:false},
    {t:350,on:true},{t:400,on:false},{t:600,on:true},
    {t:650,on:false},{t:900,on:true},{t:920,on:false},
  ];
  flickers.forEach(f=>{
    setTimeout(()=>{flashForceOff=!f.on},f.t);
  });
  // 920ms 후 완전 꺼짐 + 파도 소리
  setTimeout(()=>{
    flashForceOff=true;flashBoost=0;
    playWaveSFX();
    person.state='blackout';person.stateStart=Date.now();
  },920);
  // 2.5초 후 사람 이동 + 손전등 복구
  setTimeout(()=>{
    const rock=rocks[Math.floor(Math.random()*rocks.length)];
    person.x=rock.x;person.y=rock.y-rock.size*0.3;
    person.alpha=1;person.state='crouching';person.stateStart=Date.now();
    spotTimer=0;flashForceOff=false;
    showWaiting();
  },2500);
}

// 첫 줄 자동
let started=false;
const T0=Date.now();

// ═══════════════════════════════════════
// 루프
// ═══════════════════════════════════════
function loop(){
  const now=Date.now(),t=now*0.001;
  cx.clearRect(0,0,W,H);cx.fillStyle='#020406';cx.fillRect(0,0,W,H);

  if(!started&&now-T0>2500){started=true;typeLine()}

  // 손전등 알파
  if(flashForceOff)flashAlpha=Math.max(0,flashAlpha-0.05);
  else flashAlpha=Math.min(1,flashAlpha+0.03);
  if(person.state==='waving')flashBoost=Math.min(0.4,flashBoost+0.008);
  else flashBoost=Math.max(0,flashBoost-0.02);
  const ef=flashOn?flashAlpha:0;
  const breathing=0.08*Math.sin(t*1.5)*Math.sin(t*0.7); // 브리딩
  const tf=Math.min(1.5,ef+flashBoost+shakeEnergy*0.5+breathing);
  shakeEnergy*=0.95; // 감쇠

  if(flashOn){smx+=(mx-smx)*0.1;smy+=(my-smy)*0.1}

  // 물결
  cx.textBaseline='middle';cx.textAlign='center';
  for(const w of waves){
    w.x+=w.speed;if(w.x>W+80){w.x=-80;w.y=Math.random()*H}
    const py=w.y+Math.sin(t*w.freq+w.phase)*w.amp;
    let a=w.alpha;
    if(tf>0.01){const d=Math.hypot(w.x-smx,py-smy);a+=Math.max(0,1-d/FLASH_R)**2*0.55*tf}
    if(a<0.005)continue;
    const dep=py/H;
    cx.font=`${w.weight} ${w.size}px "Noto Serif KR"`;
    cx.fillStyle=`hsla(${195+dep*20},${30+(1-dep)*25}%,${40+(1-dep)*30}%,${Math.min(0.5,a)})`;
    cx.fillText(w.pattern,w.x,py);
  }

  // 갯바위
  for(const r of rocks){
    let a=0.04;
    if(tf>0.01){const d=Math.hypot(r.x-smx,r.y-smy);a+=Math.max(0,1-d/FLASH_R)**2*0.7*tf}
    if(a<0.01)continue;drawRock(r,a);
  }

  // 사람 상태
  let near=false;
  if(flashOn&&ef>0.3&&person.alpha>0.3&&!flashForceOff){
    if(Math.hypot(person.x-smx,person.y-smy)<FLASH_R*0.6)near=true;
  }

  switch(person.state){
    case 'fadein':
      person.alpha=Math.min(1,person.alpha+0.03);
      if(person.alpha>=1){person.state='crouching'}
      break;
    case 'crouching':
      if(near){spotTimer+=16;if(spotTimer>=SPOT_MS){
        person.state='waving';person.stateStart=now;spotTimer=0;
        FLASH_R=Math.min(280,FLASH_R+12);hideWaiting();
        if(!typing&&!done&&started)typeLine();
      }}else{spotTimer=Math.max(0,spotTimer-40)}
      break;
    case 'waving':break;
    case 'blackout':break;
  }

  // 사람 그리기 — 손전등 비춰야만 보임
  if(person.state!=='hidden'&&person.state!=='blackout'&&person.alpha>0.01){
    let pa=0;
    if(tf>0.01){const d=Math.hypot(person.x-smx,person.y-smy);pa=Math.max(0,1-d/FLASH_R)**2*0.9*tf*person.alpha}
    if(pa>0.01){if(person.state==='waving')drawWave(pa,t);else drawCrouch(pa)}
  }

  // 글로우
  if(tf>0.01){
    const grd=cx.createRadialGradient(smx,smy,0,smx,smy,FLASH_R*1.3);
    grd.addColorStop(0,`rgba(80,100,120,${0.08*tf})`);
    grd.addColorStop(0.6,`rgba(60,80,100,${0.035*tf})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=grd;cx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
