<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6월 역대급 장마 온다</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1e2e;
  font-family:'Noto Sans KR',sans-serif;
  overflow:hidden;height:100vh;
  color:#fff;cursor:pointer;user-select:none;
}
/* 고정 뷰포트 */
.viewport{
  position:fixed;inset:0;
  overflow:hidden;
}

/* 하늘 배경 */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#2c3e6b 0%,#4a6fa5 40%,#8babc7 100%);
  transition:background 1s;
}

/* 빗방울 캔버스 */
canvas#rain{position:absolute;inset:0;z-index:2;pointer-events:none}

/* 수면 + 물 */
canvas#water{position:absolute;inset:0;z-index:3;pointer-events:none}

/* 타이포 레이어 */
.typo-layer{
  position:absolute;inset:0;z-index:4;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  pointer-events:none;
}

.headline{
  font-family:'Noto Sans KR',sans-serif;
  font-weight:900;
  font-size:clamp(2.5rem,9vw,7rem);
  line-height:1.15;
  letter-spacing:0.02em;
  position:relative;
}
.headline .line{display:block;position:relative;color:transparent}
.headline .line:nth-child(1){color:transparent}
.headline .line:nth-child(2){color:transparent;text-shadow:none}
.headline .line:nth-child(3){color:transparent;font-size:0.6em}

/* 빗줄기 타이포 캔버스 */
canvas#rain-typo{
  position:absolute;inset:0;z-index:5;
  pointer-events:none;
}

.sub{
  margin-top:16px;
  font-size:clamp(0.7rem,2vw,1rem);
  color:transparent;
  font-weight:300;
}

/* 수위 마커 */
.level-marker{
  position:fixed;right:20px;top:50%;transform:translateY(-50%);
  z-index:10;
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
}
.lm-bar{
  width:4px;height:30vh;
  background:rgba(255,255,255,0.06);
  border-radius:2px;position:relative;
}
.lm-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#5bcefa,#2980b9);
  border-radius:2px;
  transition:height 0.3s;
}
.lm-label{font-size:0.55rem;color:rgba(255,255,255,0.25);font-weight:700;letter-spacing:0.1em}
.lm-val{font-size:0.9rem;font-weight:900;color:#5bcefa;font-family:'Black Han Sans',sans-serif}

/* 기상청 답변 카드 */
.response-card{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
  z-index:20;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:14px 24px;
  max-width:460px;width:90vw;text-align:center;
  opacity:0;transition:all 0.6s cubic-bezier(0.16,1,0.3,1);
}
.response-card.show{transform:translateX(-50%) translateY(0);opacity:1}
.rc-who{font-size:0.55rem;color:rgba(255,255,255,0.3);letter-spacing:0.15em;font-weight:700}
.rc-text{font-size:0.85rem;margin-top:6px;line-height:1.6;color:rgba(255,255,255,0.7)}
.rc-text strong{color:#5bcefa}

/* 스크롤 힌트 */
.scroll-hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:15;font-size:0.65rem;color:rgba(255,255,255,0.2);
  animation:sh-bob 2s ease infinite;
}
@keyframes sh-bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
</style>
</head>
<body>

<div class="viewport">
  <div class="sky" id="sky"></div>
  <canvas id="rain"></canvas>
  <canvas id="water"></canvas>
  <canvas id="rain-typo"></canvas>

  <div class="typo-layer" id="typo">
    <div class="headline">
      <span class="line">6월</span>
      <span class="line">역대급 장마</span>
      <span class="line">온다</span>
    </div>
    <div class="sub">"퍼지자…기상청이 내놓은 답"</div>
  </div>
</div>

<div class="level-marker">
  <div class="lm-label">수위</div>
  <div class="lm-bar"><div class="lm-fill" id="lm-fill"></div></div>
  <div class="lm-val" id="lm-val">0%</div>
</div>

<div class="response-card" id="rc">
  <div class="rc-who">기상청 공식 답변</div>
  <div class="rc-text" id="rc-text"></div>
</div>

<div class="scroll-hint" id="scroll-hint">클릭하면 번개가 칩니다 ⚡</div>

<script>
const W = innerWidth, H = innerHeight;
let progress = 0; // 0~1, 자동 진행

// ── 시간 자동 진행 (60초에 걸쳐 0→1) ──
const DURATION = 60000;
const startTime = Date.now();

function tick(){
  progress = Math.min(1, (Date.now() - startTime) / DURATION);
  update();
  requestAnimationFrame(tick);
}

// ── 번개 ──
document.addEventListener('click', e => {
  // 화면 플래시
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;z-index:50;background:rgba(255,255,255,0.8);pointer-events:none;';
  document.body.appendChild(flash);
  setTimeout(() => flash.style.opacity = '0', 50);
  setTimeout(() => flash.remove(), 300);
  flash.style.transition = 'opacity 0.25s';

  // 수면 충격파
  if(progress > 0.05){
    const idx = Math.floor((e.clientX / W) * 100);
    for(let i=Math.max(0,idx-5);i<Math.min(100,idx+5);i++){
      if(window._wave && window._wave[i]) window._wave[i].vy = -8;
    }
  }
});

const sky = document.getElementById('sky');
const typo = document.getElementById('typo');
const lmFill = document.getElementById('lm-fill');
const lmVal = document.getElementById('lm-val');
const rcEl = document.getElementById('rc');
const rcText = document.getElementById('rc-text');
const hintEl = document.getElementById('scroll-hint');

const RESPONSES = [
  {at:0.1, text:'"아직 <strong>예단하기 이르다</strong>" — 기상청 관계자'},
  {at:0.25, text:'"올해 장마는 <strong>평년보다 강수량이 많을 것</strong>으로 예상됩니다"'},
  {at:0.45, text:'"<strong>집중호우</strong> 가능성을 배제할 수 없습니다"'},
  {at:0.6, text:'"역대급이라는 표현은 <strong>과학적 근거가 부족</strong>합니다"'},
  {at:0.78, text:'"다만 <strong>대비는 철저히</strong> 해주시기 바랍니다"'},
  {at:0.92, text:'"…<strong>솔직히 저희도 잘 모릅니다</strong>"'},
];
let currentResponse = -1;

function update(){
  const dark = Math.min(1, progress * 1.5);
  const r = Math.round(44 - dark*34);
  const g = Math.round(62 - dark*52);
  const b = Math.round(107 - dark*80);
  sky.style.background = `linear-gradient(180deg,rgb(${r},${g},${b}) 0%,rgb(${r+15},${g+15},${b+8}) 100%)`;

  const typoY = 0;
  const typoBlur = 0;
  const typoOpacity = 1;
  typo.style.transform = 'none';
  typo.style.filter = 'none';
  typo.style.opacity = 1;

  lmFill.style.height = (progress*100)+'%';
  lmVal.textContent = Math.round(progress*100)+'%';

  let newResp = -1;
  for(let i = RESPONSES.length-1; i >= 0; i--){
    if(progress >= RESPONSES[i].at){ newResp = i; break; }
  }
  if(newResp !== currentResponse){
    currentResponse = newResp;
    if(newResp >= 0){
      rcText.innerHTML = RESPONSES[newResp].text;
      rcEl.classList.add('show');
    } else {
      rcEl.classList.remove('show');
    }
  }

  hintEl.style.opacity = progress > 0.08 ? '0' : '';
}

// ── 글자비 (배경) ──
(function(){
  const cv = document.getElementById('rain');
  cv.width = W; cv.height = H;
  const cx = cv.getContext('2d');

  const WORDS = ['장마','폭우','호우','비','빗물','소나기','집중호우','우산','침수','홍수','물폭탄','먹구름','천둥','번개','습기','저기압','태풍','수해','범람','하천'];

  const cols = [];
  const colW = 16;
  const numCols = Math.ceil(W*1.3 / colW);
  for(let i=0;i<numCols;i++){
    const trail = [];
    const w = WORDS[Math.floor(Math.random()*WORDS.length)];
    for(const ch of w) trail.push(ch);
    cols.push({
      x: i * colW + Math.random()*6 - W*0.15,
      y: -Math.random()*H,
      speed: 7 + Math.random()*12,
      chars: trail,
      charH: 8 + Math.random()*2,
      opacity: 0.4 + Math.random()*0.3,
      wind: -2.5 - Math.random()*3,
    });
  }

  // 수면 분해 파티클
  const splashes = [];
  class Splash{
    constructor(ch,x,y,size){
      this.ch = ch; this.x = x; this.y = y; this.size = size;
      this.vx = (Math.random()-0.5)*2;
      this.vy = -0.5 - Math.random()*1.5;
      this.opacity = 0.6 + Math.random()*0.3;
      this.scale = 1;
      this.life = 40 + Math.random()*30;
      this.age = 0;
    }
    update(){
      this.x += this.vx;
      this.vy += 0.02;
      this.y += this.vy;
      this.age++;
      const t = this.age / this.life;
      this.opacity = (1 - t) * 0.5;
      this.scale = 1 + t * 2;
      return this.age < this.life;
    }
  }

  function loop(){
    cx.clearRect(0,0,W,H);
    if(progress < 0.001){requestAnimationFrame(loop);return}

    const intensity = 0.3 + progress*2;
    const waterLevel = H * (1 - progress * 0.85);

    for(const col of cols){
      col.y += col.speed * intensity;
      col.x += col.wind * (0.5 + progress);
      const totalH = col.chars.length * col.charH;
      if(col.y - totalH > H + 20 || col.x < -50){
        col.y = -Math.random()*H*0.5;
        col.x = Math.random()*W*1.3;
        const trail = [];
        const w = WORDS[Math.floor(Math.random()*WORDS.length)];
        for(const ch of w) trail.push(ch);
        col.chars = trail;
      }

      cx.font = `700 ${col.charH}px 'Noto Sans KR', sans-serif`;
      for(let j=0;j<col.chars.length;j++){
        const cy = col.y + j * col.charH;
        const cxPos = col.x + j * col.wind * 0.4;
        if(cy < -col.charH) continue;

        // 수면 아래면 스킵 + 분해 파티클 생성
        if(cy > waterLevel && progress > 0.03){
          if(Math.random() < 0.08){
            splashes.push(new Splash(col.chars[j], cxPos, waterLevel, col.charH));
          }
          continue;
        }

        const fade = j < 1 ? 0.5 : (j >= col.chars.length-1) ? 0.5 : 1;
        cx.fillStyle = `rgba(210,225,245,${col.opacity * fade})`;
        cx.fillText(col.chars[j], cxPos, cy);
      }
    }

    // 분해 파티클 렌더
    for(let i = splashes.length-1; i >= 0; i--){
      const s = splashes[i];
      if(!s.update()){ splashes.splice(i,1); continue; }
      cx.globalAlpha = s.opacity;
      cx.font = `700 ${Math.round(s.size * s.scale)}px 'Noto Sans KR', sans-serif`;
      cx.fillStyle = `rgba(91,206,250,${s.opacity})`;
      cx.fillText(s.ch, s.x, s.y);
    }
    cx.globalAlpha = 1;
    if(splashes.length > 80) splashes.splice(0, splashes.length - 80);

    requestAnimationFrame(loop);
  }
  loop();
})();

// ── 수면 + 물 ──
(function(){
  const cv = document.getElementById('water');
  cv.width = W; cv.height = H;
  const cx = cv.getContext('2d');

  const N = 100;
  const wave = Array.from({length:N}, () => ({y:0, vy:0}));
  window._wave = wave;
  const spread = 0.025, damping = 0.97;

  setInterval(() => {
    if(progress < 0.03) return;
    const count = Math.ceil(progress * 4);
    for(let c=0;c<count;c++){
      const idx = Math.floor(Math.random()*N);
      wave[idx].vy = -(1.5 + Math.random()*3 * progress);
    }
  }, 60);

  function loop(){
    cx.clearRect(0,0,W,H);
    if(progress < 0.005){requestAnimationFrame(loop);return}

    const waterLevel = H * (1 - progress * 0.85);

    for(let i=0;i<N;i++){
      wave[i].vy += -wave[i].y * spread;
      wave[i].vy *= damping;
      wave[i].y += wave[i].vy;
    }
    for(let iter=0;iter<2;iter++){
      for(let i=1;i<N-1;i++){
        wave[i].vy += (wave[i-1].y - wave[i].y)*spread + (wave[i+1].y - wave[i].y)*spread;
      }
    }

    const segW = W/(N-1);
    cx.beginPath();
    cx.moveTo(0, waterLevel + wave[0].y);
    for(let i=1;i<N;i++){
      const px = (i-1)*segW, py = waterLevel + wave[i-1].y;
      const nx = i*segW, ny = waterLevel + wave[i].y;
      cx.quadraticCurveTo(px, py, (px+nx)/2, (py+ny)/2);
    }
    cx.lineTo(W, H); cx.lineTo(0, H); cx.closePath();

    const grad = cx.createLinearGradient(0, waterLevel, 0, H);
    grad.addColorStop(0, `rgba(30,60,114,${0.55+progress*0.35})`);
    grad.addColorStop(0.4, `rgba(20,50,100,${0.65+progress*0.25})`);
    grad.addColorStop(1, `rgba(10,25,60,${0.8+progress*0.15})`);
    cx.fillStyle = grad;
    cx.fill();

    cx.beginPath();
    cx.moveTo(0, waterLevel + wave[0].y);
    for(let i=1;i<N;i++){
      const px = (i-1)*segW, py = waterLevel + wave[i-1].y;
      const nx = i*segW, ny = waterLevel + wave[i].y;
      cx.quadraticCurveTo(px, py, (px+nx)/2, (py+ny)/2);
    }
    cx.strokeStyle = `rgba(91,206,250,${0.2+progress*0.5})`;
    cx.lineWidth = 2;
    cx.stroke();

    requestAnimationFrame(loop);
  }
  loop();
})();

// ── 글자비 타이포 (헤드라인 고정 + 물 차오르기) ──
(function(){
  const cv = document.getElementById('rain-typo');
  cv.width = W; cv.height = H;
  const cx = cv.getContext('2d');

  const WORDS = ['장마','폭우','호우','비','빗물','소나기','집중호우','우산','침수','홍수','물폭탄','먹구름','천둥','습기','저기압','수해','범람'];

  const lines = [
    {text:'6월', size: Math.min(W*0.09, 112)},
    {text:'역대급 장마', size: Math.min(W*0.09, 112)},
    {text:'온다', size: Math.min(W*0.054, 67)},
  ];
  const subText = '"퍼지자…기상청이 내놓은 답"';
  const subSize = Math.min(W*0.02, 16);

  // 글자 마스크 (고정)
  const mask = document.createElement('canvas');
  mask.width = W; mask.height = H;
  const mx = mask.getContext('2d');

  function buildMask(){
    mx.clearRect(0,0,W,H);
    mx.textAlign = 'center';
    mx.textBaseline = 'middle';
    const totalH = lines.reduce((s,l) => s + l.size * 1.1, 0);
    let y = H/2 - totalH/2;
    for(const l of lines){
      y += l.size * 0.55;
      mx.font = `900 ${l.size}px 'Noto Sans KR', sans-serif`;
      mx.fillStyle = '#fff';
      mx.fillText(l.text, W/2, y);
      y += l.size * 0.55;
    }
    mx.font = `300 ${subSize}px 'Noto Sans KR', sans-serif`;
    mx.fillText(subText, W/2, y + 20);
  }

  let maskData = null;

  // 물 채움용 오프스크린 캔버스
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tx = tmp.getContext('2d');

  // 글자비 컬럼
  const colW = 6;
  const numCols = Math.ceil(W*1.3 / colW);
  const tCols = [];
  for(let i=0;i<numCols;i++){
    const trail = [];
    const w = WORDS[Math.floor(Math.random()*WORDS.length)];
    for(const ch of w) trail.push(ch);
    tCols.push({
      x: i * colW + Math.random()*3 - W*0.15,
      y: -Math.random()*H,
      speed: 3 + Math.random()*5,
      chars: trail,
      charH: 7 + Math.random()*2,
      opacity: 0.85 + Math.random()*0.15,
      wind: -2 - Math.random()*2.5,
    });
  }

  function loop(){
    cx.clearRect(0,0,W,H);

    const waterLevel = H * (1 - progress * 0.85);
    const intensity = 0.4 + progress*1.8;

    // 1) 글자비 — 헤드라인 클리핑
    for(const col of tCols){
      col.y += col.speed * intensity;
      col.x += col.wind * (0.5 + progress);
      if(col.y > H + 20 || col.x < -50){
        col.y = -Math.random()*H*0.5;
        col.x = Math.random()*W*1.3;
        const trail = [];
        const w = WORDS[Math.floor(Math.random()*WORDS.length)];
        for(const ch of w) trail.push(ch);
        col.chars = trail;
      }

      cx.font = `700 ${col.charH}px 'Noto Sans KR', sans-serif`;
      for(let j=0;j<col.chars.length;j++){
        const cy = col.y + j * col.charH;
        const cxPos = col.x + j * col.wind * 0.4;
        if(cy < -col.charH || cy > H + col.charH) continue;

        const px = Math.floor(cxPos + col.charH*0.3);
        const py = Math.floor(cy);
        if(px < 0 || px >= W || py < 0 || py >= H) continue;
        const idx = (py * W + px) * 4;
        if(maskData[idx+3] < 128) continue;

        // 수위 아래는 그리지 않음 (솔리드 채움이 대체)
        if(cy > waterLevel) continue;

        const fade = j < 1 ? 0.5 : (j >= col.chars.length-1) ? 0.5 : 1;
        cx.fillStyle = `rgba(220,240,255,${col.opacity * fade})`;
        cx.fillText(col.chars[j], cxPos, cy);
      }
    }

    // 2) 수위 아래 글자 영역: 진한 물 채움 (클리핑 방식)
    if(progress > 0.01){
      tx.clearRect(0,0,W,H);
      const wGrad = tx.createLinearGradient(0, waterLevel, 0, H);
      wGrad.addColorStop(0, 'rgba(80,180,240,1)');
      wGrad.addColorStop(0.5, 'rgba(50,130,210,1)');
      wGrad.addColorStop(1, 'rgba(30,90,180,1)');
      tx.globalCompositeOperation = 'source-over';
      tx.fillStyle = wGrad;
      tx.fillRect(0, waterLevel - 3, W, H - waterLevel + 3);
      tx.globalCompositeOperation = 'destination-in';
      tx.drawImage(mask, 0, 0);
      cx.drawImage(tmp, 0, 0);
    }

    // 3) 글로우 (약하게)
    cx.save();
    cx.globalCompositeOperation = 'lighter';
    cx.globalAlpha = 0.06;
    cx.filter = 'blur(2px)';
    cx.drawImage(mask, 0, 0);
    cx.restore();

    requestAnimationFrame(loop);
  }

  document.fonts.ready.then(() => {
    buildMask();
    maskData = mx.getImageData(0,0,W,H).data;
    loop();
  });
})();

tick();
</script>
</body>
</html>
